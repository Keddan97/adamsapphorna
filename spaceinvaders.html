<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rymdinvaders</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root { --neon-cyan:#00f5ff; --neon-pink:#ff006e; --neon-yellow:#ffbe0b; --neon-green:#06ffa5; --dark-bg:#03010a; --panel-bg:rgba(0,20,40,0.85); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark-bg); color:#fff; font-family:'Share Tech Mono',monospace; overflow:hidden; width:100vw; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #gameCanvas { display:none; cursor:none; }
  #startScreen,#reportScreen { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--dark-bg); z-index:10; }
  #reportScreen { display:none; }
  .title-main { font-family:'Orbitron',sans-serif; font-size:clamp(2rem,5vw,4rem); font-weight:900; color:var(--neon-cyan); text-shadow:0 0 20px var(--neon-cyan),0 0 40px var(--neon-cyan); letter-spacing:4px; text-align:center; animation:pulseTitle 3s ease-in-out infinite; }
  .title-sub { font-family:'Orbitron',sans-serif; font-size:clamp(0.9rem,2vw,1.4rem); color:var(--neon-pink); text-shadow:0 0 10px var(--neon-pink); letter-spacing:8px; margin-top:8px; text-align:center; }
  @keyframes pulseTitle { 0%,100%{text-shadow:0 0 20px var(--neon-cyan),0 0 40px var(--neon-cyan);}50%{text-shadow:0 0 30px var(--neon-cyan),0 0 60px var(--neon-cyan),0 0 100px var(--neon-cyan);} }
  .sector-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:40px; width:min(700px,90vw); }
  .sector-btn-ultimate { background:rgba(255,190,11,0.07); border:2px solid var(--neon-yellow); color:var(--neon-yellow); font-family:'Orbitron',sans-serif; font-size:0.9rem; font-weight:700; padding:18px 16px; cursor:pointer; text-transform:uppercase; letter-spacing:3px; transition:all 0.2s; text-align:center; clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px)); width:min(700px,90vw); margin-top:4px; }
  .sector-btn-ultimate:hover { background:rgba(255,190,11,0.2); box-shadow:0 0 30px var(--neon-yellow),inset 0 0 20px rgba(255,190,11,0.1); transform:translateY(-3px); }
  .sector-btn { background:var(--panel-bg); border:2px solid var(--neon-cyan); color:var(--neon-cyan); font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:700; padding:20px 16px; cursor:pointer; text-transform:uppercase; letter-spacing:2px; transition:all 0.2s; text-align:center; clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px)); }
  .sector-btn:hover { background:rgba(0,245,255,0.15); box-shadow:0 0 20px var(--neon-cyan),inset 0 0 20px rgba(0,245,255,0.1); transform:translateY(-3px); }
  .sector-btn .sector-icon { font-size:2rem; display:block; margin-bottom:8px; }
  .sector-btn .sector-count { font-size:0.65rem; color:rgba(0,245,255,0.6); margin-top:4px; }
  .neon-btn { background:transparent; border:2px solid var(--neon-pink); color:var(--neon-pink); font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; padding:14px 40px; cursor:pointer; text-transform:uppercase; letter-spacing:4px; margin-top:30px; transition:all 0.2s; clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px)); }
  .neon-btn:hover { background:rgba(255,0,110,0.2); box-shadow:0 0 20px var(--neon-pink); transform:translateY(-2px); }
  #hud { display:none; position:fixed; top:0; left:0; right:0; z-index:5; padding:10px 20px; background:linear-gradient(to bottom,rgba(0,0,0,0.9) 0%,transparent 100%); pointer-events:none; }
  #hud.active { display:flex; justify-content:space-between; align-items:center; }
  .hud-item { font-family:'Orbitron',sans-serif; font-size:0.75rem; color:var(--neon-cyan); text-shadow:0 0 8px var(--neon-cyan); }
  .hud-score { font-size:1.1rem; font-weight:700; }
  #questionDisplay { display:none; position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:5; width:min(800px,90vw); background:var(--panel-bg); border:1px solid var(--neon-cyan); border-top:3px solid var(--neon-cyan); padding:14px 20px; text-align:center; font-size:clamp(0.85rem,2vw,1.05rem); color:#fff; pointer-events:none; box-shadow:0 0 20px rgba(0,245,255,0.2); line-height:1.4; }
  #questionDisplay.active { display:block; }
  .report-container { width:min(800px,90vw); max-height:80vh; overflow-y:auto; background:var(--panel-bg); border:2px solid var(--neon-cyan); padding:30px; clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px)); }
  .report-container::-webkit-scrollbar{width:6px;} .report-container::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);} .report-container::-webkit-scrollbar-thumb{background:var(--neon-cyan);}
  .report-title { font-family:'Orbitron',sans-serif; font-size:1.5rem; color:var(--neon-cyan); text-shadow:0 0 15px var(--neon-cyan); text-align:center; margin-bottom:20px; }
  .report-stats { display:flex; gap:20px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
  .stat-box { text-align:center; padding:14px 24px; border:1px solid; flex:1; min-width:120px; }
  .stat-box.correct{border-color:var(--neon-green);color:var(--neon-green);} .stat-box.wrong{border-color:var(--neon-pink);color:var(--neon-pink);} .stat-box.score{border-color:var(--neon-yellow);color:var(--neon-yellow);}
  .stat-num { font-family:'Orbitron',sans-serif; font-size:2rem; font-weight:900; display:block; }
  .stat-label { font-size:0.7rem; letter-spacing:2px; margin-top:4px; opacity:0.8; }
  .missed-title { font-family:'Orbitron',sans-serif; font-size:0.9rem; color:var(--neon-pink); margin-bottom:12px; letter-spacing:2px; border-bottom:1px solid rgba(255,0,110,0.3); padding-bottom:8px; }
  .missed-item { background:rgba(255,0,110,0.05); border-left:3px solid var(--neon-pink); padding:12px 14px; margin-bottom:10px; font-size:0.85rem; line-height:1.6; }
  .missed-q{color:var(--neon-yellow);margin-bottom:4px;} .missed-your{color:rgba(255,100,100,0.9);} .missed-correct{color:var(--neon-green);} .missed-explain{color:rgba(200,220,255,0.8);margin-top:6px;font-size:0.8rem;font-style:italic;}
  .report-footer{text-align:center;margin-top:20px;}
  .progress-bar-container{width:100%;height:4px;background:rgba(255,255,255,0.1);margin-top:4px;border-radius:2px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(to right,var(--neon-cyan),var(--neon-pink));transition:width 0.5s ease;}
</style>
</head>
<body>

<div id="startScreen">
  <canvas id="bgStars" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
  <div style="position:relative;z-index:2;text-align:center;">
    <div class="title-main">🚀 RYMDINVADERS</div>
    <div class="title-sub">Gymnasienivå · SvN1</div>
    <p style="margin-top:30px;color:rgba(200,220,255,0.7);font-size:0.85rem;letter-spacing:1px;">Välj en sektor att försvara</p>
    <div class="sector-grid">
      <button class="sector-btn" onclick="startSector(0)"><span class="sector-icon">📚</span>Genrekollen<div class="sector-count">30 av 45 frågor slumpas</div></button>
      <button class="sector-btn" onclick="startSector(1)"><span class="sector-icon">🏛️</span>Epokjägaren<div class="sector-count">30 av 45 frågor slumpas</div></button>
      <button class="sector-btn" onclick="startSector(2)"><span class="sector-icon">📰</span>Sakprosa-sikten<div class="sector-count">30 av 45 frågor slumpas</div></button>
      <button class="sector-btn" onclick="startSector(3)"><span class="sector-icon">✏️</span>Grammatik-glidaren<div class="sector-count">30 av 45 frågor slumpas</div></button>
    </div>
    <button class="sector-btn-ultimate" onclick="startUltimate()">⚡ ULTIMATA UTMANINGEN ⚡<div class="sector-count" style="color:rgba(255,190,11,0.7);margin-top:6px;">30 frågor slumpas från ALLA kategorier</div></button>
    <p style="margin-top:24px;color:rgba(150,170,200,0.6);font-size:0.75rem;">Styr med musen · Klicka för att skjuta rätt svar</p>
  </div>
</div>

<div id="hud">
  <div class="hud-item hud-score">⭐ <span id="scoreDisplay">0</span></div>
  <div class="hud-item">
    <div>Fråga <span id="questionNum">1</span>/30</div>
    <div class="progress-bar-container" style="width:160px;margin-top:4px;"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  </div>
  <div class="hud-item">❤️ <span id="livesDisplay">3</span> liv</div>
</div>

<div id="questionDisplay"></div>
<canvas id="gameCanvas"></canvas>

<div id="reportScreen">
  <canvas id="bgStars2" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
  <div style="position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;padding:20px;">
    <div class="report-container">
      <div class="report-title">📋 UPPDRAGSRAPPORT</div>
      <div class="report-stats" id="reportStats"></div>
      <div id="reportMissed"></div>
    </div>
    <div class="report-footer"><button class="neon-btn" onclick="showStart()">⬅ Välj ny sektor</button></div>
  </div>
</div>

<script>
// ===================== QUESTION DATA =====================
// Each question: { q, correct, wrong1, wrong2, exp }
// correct answer position is RANDOMIZED at spawn time

const RAW_SECTORS = [
  // ============ SEKTOR 0: GENREKOLLEN ============
  { name:"Genrekollen", qs:[
    { q:"Berättande litteratur – romaner och noveller kallas...", correct:"Epik", wrong1:"Lyrik", wrong2:"Dramatik", exp:"Epik är samlingsnamnet för berättande prosa och fiktion." },
    { q:"Poesi och dikter som förmedlar en känsla eller stämning kallas...", correct:"Lyrik", wrong1:"Epik", wrong2:"Sakprosa", exp:"Lyrik fokuserar på korta ögonblick, stämningar och känslor." },
    { q:"Texter skrivna för att framföras på en scen kallas...", correct:"Dramatik", wrong1:"Epik", wrong2:"Lyrik", exp:"Dramatik är handlingens litteratur – dialogen för berättelsen framåt." },
    { q:"Den talande rösten i en dikt kallas...", correct:"Dikt-jag", wrong1:"Berättaren", wrong2:"Protagonisten", exp:"I lyrik kallas 'berättaren' för ett dikt-jag – det är inte nödvändigtvis författaren." },
    { q:"Upprepning i början av flera versrader kallas...", correct:"Anafor", wrong1:"Allitteration", wrong2:"Besjälning", exp:"Anafor: varje rad eller fras inleds med samma ord eller fras." },
    { q:"En bildlig jämförelse med ordet 'som' kallas...", correct:"Liknelse", wrong1:"Metafor", wrong2:"Symbol", exp:"Liknelse: 'Han var stark SOM en björn'. Notera jämförelseordet 'som'." },
    { q:"Instruktioner om hur rum och miljö ska vara i ett manus kallas...", correct:"Scenanvisning", wrong1:"Replik", wrong2:"Spelanvisning", exp:"Scenanvisningar riktar sig till regissören och beskriver miljön." },
    { q:"Samtal mellan två eller flera karaktärer kallas...", correct:"Dialog", wrong1:"Monolog", wrong2:"Replik", exp:"Dialog är när karaktärer pratar med varandra." },
    { q:"Berättelsens höjdpunkt där konflikten avgörs kallas...", correct:"Klimax", wrong1:"Anslag", wrong2:"Avrundning", exp:"Klimax är den punkt där spänningen är som störst och konflikten avgörs." },
    { q:"Döda föremål ges mänskliga egenskaper – det kallas...", correct:"Besjälning", wrong1:"Metafor", wrong2:"Symbol", exp:"Besjälning: 'väggen stirrade elakt'. Livlöst ting tillskrivs mänskliga egenskaper." },
    { q:"En dikt som inte följer regler för rim eller fast rytm kallas...", correct:"Fri form", wrong1:"Bunden form", wrong2:"Sonet", exp:"Fri form är modern poesi utan fast takt eller rimschema." },
    { q:"Berättare som har insyn i ALLA karaktärers tankar kallas...", correct:"Allvetande berättare", wrong1:"Jagberättare", wrong2:"Opålitlig berättare", exp:"Den allvetande (omnisciente) berättaren ser in i alla karaktärers inre." },
    { q:"Ett konkret föremål som representerar en abstrakt idé kallas...", correct:"Symbol", wrong1:"Metafor", wrong2:"Liknelse", exp:"Symbol: duvan = fred. Konkret föremål med djupare abstrakt betydelse." },
    { q:"Ett bildligt uttryck UTAN ordet 'som' kallas...", correct:"Metafor", wrong1:"Liknelse", wrong2:"Symbol", exp:"Metafor: 'Du är en ros'. Direkt liknar en sak vid en annan utan jämförelseord." },
    { q:"En kort berättande text som fokuserar på EN händelse kallas...", correct:"Novell", wrong1:"Roman", wrong2:"Epos", exp:"Novellen är kort, koncentrerad och har ofta en poäng eller vändning i slutet." },
    { q:"Ett sorgespel som slutar i olycka eller katastrof kallas...", correct:"Tragedi", wrong1:"Komedi", wrong2:"Farsens", exp:"Tragedier skildrar hjältens fall – ofta på grund av ett karaktärsfel." },
    { q:"En grupp versrader i en dikt (motsvarar stycke i prosa) kallas...", correct:"Strof", wrong1:"Versrad", wrong2:"Stanza", exp:"Poesi delas in i strofer, inte stycken." },
    { q:"En enskild rad i ett poem kallas...", correct:"Versrad", wrong1:"Strof", wrong2:"Stavelse", exp:"Versraden är den grundläggande byggnadsenheten i poesi." },
    { q:"Berättelsens inledning där konflikten introduceras kallas...", correct:"Anslag", wrong1:"Klimax", wrong2:"Fördjupning", exp:"Anslaget är det som fångar läsarens intresse och presenterar konflikten." },
    { q:"Instruktioner om hur något ska SÄGAS eller GÖRAS på scen kallas...", correct:"Spelanvisning", wrong1:"Scenanvisning", wrong2:"Rekvisita", exp:"Spelanvisningar riktar sig till skådespelaren och gäller agerande/tonfall." },
    { q:"Lösa föremål som används på scen kallas...", correct:"Rekvisita", wrong1:"Scenografi", wrong2:"Dekor", exp:"Rekvisita är de rörliga föremål som används av skådespelarna." },
    { q:"En längre berättande dikt om hjältar och gudar från antiken kallas...", correct:"Epos", wrong1:"Tragedi", wrong2:"Ode", exp:"Epos är långa berättelser på vers: Iliaden och Odysséen är exempel." },
    { q:"Att en mening fortsätter på nästa rad utan paus i en dikt kallas...", correct:"Enjambement", wrong1:"Cesur", wrong2:"Anafor", exp:"Enjambement: radbrytning mitt i en syntaktisk enhet – skapar rörelse och fart." },
    { q:"Upprepning av samma inledande konsonantljud i ord kallas...", correct:"Allitteration", wrong1:"Anafor", wrong2:"Assonans", exp:"Allitteration: 'Stora stygga vargen'. Samma inledande ljud upprepas." },
    { q:"Berättelsens protagonist möter en antagonist. Vad är antagonisten?", correct:"Motspelaren", wrong1:"Hjälpfiguren", wrong2:"Berättarrösten", exp:"Antagonisten är den kraft eller person som motverkar protagonistens mål." },
    { q:"Kameravinkel där man filmar uppifrån ner kallas...", correct:"Fågelperspektiv", wrong1:"Grodperspektiv", wrong2:"Normalperspektiv", exp:"Fågelperspektiv får motivet att verka litet och undergivet." },
    { q:"Kameravinkel där man filmar nedifrån upp kallas...", correct:"Grodperspektiv", wrong1:"Fågelperspektiv", wrong2:"Halvbild", exp:"Grodperspektiv ger motivet auktoritet och styrka." },
    { q:"Filmljud som BARA publiken hör (t.ex. bakgrundsmusik) kallas...", correct:"Icke-diegetiskt ljud", wrong1:"Diegetiskt ljud", wrong2:"Extradiegetiskt ljud", exp:"Icke-diegetiskt ljud existerar inte i filmens värld – bara för oss." },
    { q:"Filmljud som karaktärerna i filmen OCKSÅ hör kallas...", correct:"Diegetiskt ljud", wrong1:"Icke-diegetiskt ljud", wrong2:"Voiceover", exp:"Diegetiskt ljud: radio i rummet, samtal – karaktärerna kan höra det." },
    { q:"Bild där en person syns från midjan och upp kallas...", correct:"Halvbild", wrong1:"Helbild", wrong2:"Närbild", exp:"Halvbild används ofta i dialogscener och visar kroppsspråk ovan midjan." },
    { q:"En text vars karaktärer, händelser och platser har en dold symbolisk mening kallas...", correct:"Allegori", wrong1:"Parodi", wrong2:"Satir", exp:"Allegori: Stiernhielms Hercules är en allegori om livsval – Lusta vs Dygd." },
    { q:"Kritik av makten dold under humor och ironi kallas...", correct:"Satir", wrong1:"Parodi", wrong2:"Allegori", exp:"Satir används t.ex. av Voltaire och Swift för att kritisera samhälle och makt." },
    { q:"Den dramaturgiska kurvan skapades av...", correct:"Aristoteles", wrong1:"Platon", wrong2:"Homeros", exp:"Aristoteles beskrev berättelsens dramaturgi i sin Poetik." },
    { q:"Genren som fokuserar på ett enda ögonblick och förmedlar en känsla är...", correct:"Lyrik", wrong1:"Epik", wrong2:"Dramatik", exp:"Lyrik: koncentrerat språk, bildspråk, stämning – ordet kommer från instrumentet lyra." },
    { q:"När meningen eller handlingen hoppar bakåt i tid kallas det...", correct:"Flashback / tillbakablick", wrong1:"Framåtblick", wrong2:"In medias res", exp:"Flashback (analepsis) bryter kronologin och återberättar något tidigare." },
    { q:"En text med kontrast där motsatta egenskaper ställs mot varandra kallas...", correct:"Antites", wrong1:"Allitteration", wrong2:"Assonans", exp:"Antites skapar kontrast och förtydligar: 'liten men mäktig', 'dag och natt'." },
    { q:"Berättelsens del då karaktärerna och miljön introduceras kallas...", correct:"Presentation", wrong1:"Anslag", wrong2:"Fördjupning", exp:"I presentationen får vi lära känna protagonist, antagonist och miljö." },
    { q:"Ett lustspel som syftar till att underhålla och som slutar lyckligt kallas...", correct:"Komedi", wrong1:"Tragedi", wrong2:"Drama", exp:"Komedier slutar nästan alltid lyckligt – de belyser ofta mänskliga svagheter med humor." },
    { q:"Antikens epos om Odysseus hemresa kallas...", correct:"Odysséen", wrong1:"Iliaden", wrong2:"Eneaden", exp:"Odysséen av Homeros handlar om Odysseus tioåriga hemresa till Ithaka." },
    { q:"Antikens epos om kriget vid Troja kallas...", correct:"Iliaden", wrong1:"Odysséen", wrong2:"Eneaden", exp:"Iliaden av Homeros handlar om Akilles och grekernas krig mot Troja." },
    { q:"Hur starka känslor eller spänning byggs upp över tid i en berättelse kallas...", correct:"Dramaturgiska kurvan", wrong1:"Kompositionsmodellen", wrong2:"Spänningsaxeln", exp:"Den dramaturgiska kurvan visar förhållandet mellan spänning och tid." },
    { q:"En karaktär som förblir densamma genom hela berättelsen kallas...", correct:"Platt karaktär", wrong1:"Rund karaktär", wrong2:"Statisk antagonist", exp:"Platta karaktärer har få egenskaper och förändras inte – runda är mer komplexa." },
    { q:"Klippning som visar två händelser som sker SAMTIDIGT kallas...", correct:"Parallellklippning", wrong1:"Osynlig klippning", wrong2:"Synlig klippning", exp:"Parallellklippning hoppar mellan två parallella handlingar för att skapa spänning." },
    { q:"När filmen klipps så att vi INTE märker klipparna kallas...", correct:"Osynlig klippning", wrong1:"Synlig klippning", wrong2:"Parallellklippning", exp:"Osynlig klippning skapar ett flöde – vi lever oss in utan att störas av klippar." },
    { q:"Hårt ljus med skarpa kontraster i film kallas...", correct:"Low key", wrong1:"High key", wrong2:"Dramatisk ljussättning", exp:"Low key: skuggorna är djupa och detaljerna i dem försvinner – skapar mystik/spänning." },
  ]},

  // ============ SEKTOR 1: EPOKJÄGAREN ============
  { name:"Epokjägaren", qs:[
    { q:"Epok med fokus på gudar, ödet och hjältar (700 f.Kr–500 e.Kr) kallas...", correct:"Antiken", wrong1:"Medeltiden", wrong2:"Renässansen", exp:"Antiken lade grunden för västerländsk litteratur, filosofi och demokrati." },
    { q:"Gudscentrerad tid (500–1500 e.Kr) där kyrkan styrde kallas...", correct:"Medeltiden", wrong1:"Antiken", wrong2:"Upplysningen", exp:"Under medeltiden var den teocentriska världsbilden dominerande – Gud i centrum." },
    { q:"Epoken vars namn betyder 'pånyttfödelse' av antikens ideal kallas...", correct:"Renässansen", wrong1:"Romantiken", wrong2:"Barocken", exp:"Renässansen (1400–1600) återupptäckte antikens konst och filosofi." },
    { q:"Epok som betonade förnuft, empirism och vetenskap kallas...", correct:"Upplysningen", wrong1:"Romantiken", wrong2:"Renässansen", exp:"Upplysningen ville 'lysa upp mörkret' med förnuftets ljus." },
    { q:"Epok som reagerade mot förnuftet med starka känslor och naturlängtan kallas...", correct:"Romantiken", wrong1:"Upplysningen", wrong2:"Realismen", exp:"Romantiken (ca 1790–1830) satte hjärta och känsla före förnuft." },
    { q:"Epok som ville beskriva verkligheten objektivt – som ett fotografi kallas...", correct:"Realismen", wrong1:"Naturalismen", wrong2:"Romantiken", exp:"Realismen (ca 1830–1890) skildrade vardagsmänniskor och sociala problem." },
    { q:"Epok som menade att arv och miljö determinerar individen kallas...", correct:"Naturalismen", wrong1:"Realismen", wrong2:"Modernismen", exp:"Naturalismen applicerade vetenskapliga metoder – individen styrs av biologi och samhälle." },
    { q:"Epok (ca 1890–1945) som experimenterade med inre tankeflöden och bröt mot regler kallas...", correct:"Modernismen", wrong1:"Naturalismen", wrong2:"Romantiken", exp:"Modernismen fokuserade på det inre snarare än yttre verklighet." },
    { q:"Att begå 'övermod' mot gudarna i antiken kallas...", correct:"Hybris", wrong1:"Nemesis", wrong2:"Katarsis", exp:"Hybris (övermod) ledde alltid till nemesis (gudarnas hämnd) i antiken." },

// ===================== AUDIO ENGINE =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let bgGainNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  startBgMusic();
}

function startBgMusic() {
  if (!audioCtx) return;
  bgGainNode = audioCtx.createGain();
  bgGainNode.gain.value = 0.07;
  bgGainNode.connect(audioCtx.destination);

  const freqs = [55, 110, 165, 220, 82.5];
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    g.gain.value = 0.3 + i * 0.04;
    osc.connect(g); g.connect(bgGainNode);
    const lfo = audioCtx.createOscillator();
    const lg = audioCtx.createGain();
    lfo.frequency.value = 0.05 + i * 0.03;
    lg.gain.value = 4;
    lfo.connect(lg); lg.connect(osc.frequency);
    osc.start(); lfo.start();
  });

  let step = 0;
  const notes = [220, 261.6, 329.6, 392, 329.6, 261.6];
  function arp() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = notes[step % notes.length];
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
    o.connect(g); g.connect(bgGainNode);
    o.start(); o.stop(audioCtx.currentTime + 1.5);
    step++; setTimeout(arp, 1200);
  }
  setTimeout(arp, 600);
}

function playLaser() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain(), d = audioCtx.createWaveShaper();
  const c = new Float32Array(256);
  for (let i=0;i<256;i++){const x=(i*2)/256-1;c[i]=x*3;} d.curve=c;
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(1200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.18);
  g.gain.setValueAtTime(0.35, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.connect(d); d.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.22);
}

function playCorrect() {
  if (!audioCtx) return;
  [523,659,784].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f; o.type='sine';
    g.gain.setValueAtTime(0,audioCtx.currentTime+i*0.1);
    g.gain.linearRampToValueAtTime(0.25,audioCtx.currentTime+i*0.1+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+i*0.1+0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+i*0.1); o.stop(audioCtx.currentTime+i*0.1+0.35);
  });
}

function playWrong() {
  if (!audioCtx) return;
  [220,180].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f; o.type='sawtooth';
    g.gain.setValueAtTime(0.2,audioCtx.currentTime+i*0.15);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+i*0.15+0.4);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+i*0.15); o.stop(audioCtx.currentTime+i*0.15+0.45);
  });
}

// ===================== STARS =====================
function initStars(cid) {
  const c = document.getElementById(cid); if (!c) return;
  const ctx = c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const s = Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.3,bright:Math.random(),speed:Math.random()*0.0001+0.00003,tw:Math.random()*Math.PI*2}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const t=Date.now()*0.001;
    s.forEach(st=>{
      st.y+=st.speed; if(st.y>1)st.y=0;
      const a=0.4+0.6*Math.abs(Math.sin(t*0.5+st.tw));
      ctx.beginPath(); ctx.arc(st.x*c.width,st.y*c.height,st.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${a*st.bright})`; ctx.fill();
    }); requestAnimationFrame(draw);
  } draw();
}

// ===================== GAME STATE =====================
let currentSector=0, questions=[], qIndex=0, score=0, lives=3, missedQuestions=[];
let gameActive=false, animFrame=null;
let ship={x:0,y:0};
let bullets=[], asteroids=[], particles=[], gameStars=[];
let currentQ=null, waitingForNext=false, nextTimer=0;
let flashMessage=null, flashAlpha=0;

const canvas=document.getElementById('gameCanvas');
const gctx=canvas.getContext('2d');

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function prepareQuestions(sectorIdx) {
  // Take all raw questions, convert to game format with shuffled options
  const raw = RAW_SECTORS[sectorIdx].qs;
  const shuffled = shuffle(raw).slice(0, 30);
  return shuffled.map(item => {
    // Shuffle the 3 options and track correct index
    const opts = shuffle([
      {text: item.correct, isCorrect: true},
      {text: item.wrong1, isCorrect: false},
      {text: item.wrong2, isCorrect: false}
    ]);
    const correctIdx = opts.findIndex(o => o.isCorrect);
    return {
      q: item.q,
      opts: opts.map(o => o.text),
      a: correctIdx,
      exp: item.exp
    };
  });
}

function initGameCanvas(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  ship.x=canvas.width/2; ship.y=canvas.height-90;
  gameStars=Array.from({length:180},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.4+0.3,speed:Math.random()*0.4+0.1,alpha:Math.random()*0.7+0.3}));
}

canvas.addEventListener('mousemove',e=>{if(gameActive)ship.x=e.clientX;});
canvas.addEventListener('click',()=>{if(!gameActive||waitingForNext)return;initAudio();fireBullet();});

function fireBullet(){playLaser();bullets.push({x:ship.x,y:ship.y-30,speed:14,active:true});}

function makeAsteroidPath(cx,cy,r,seed){
  const pts=14,path=[];
  for(let i=0;i<pts;i++){
    const angle=(i/pts)*Math.PI*2;
    const rnd=0.7+0.3*Math.sin(seed*13.7+i*7.3)*Math.cos(seed*5.1+i*3.7);
    path.push({x:cx+Math.cos(angle)*r*rnd,y:cy+Math.sin(angle)*r*rnd});
  } return path;
}

function drawAsteroid(ctx,ast){
  const {x,y,r,seed,text,hit,hitAlpha=1}=ast;
  ctx.save(); ctx.globalAlpha=hitAlpha;
  const pts=makeAsteroidPath(x,y,r,seed);
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
  if(hit==='correct'){ctx.fillStyle='#00ff7050';ctx.strokeStyle='#00ffa0';}
  else if(hit==='wrong'){ctx.fillStyle='#ff003050';ctx.strokeStyle='#ff0060';}
  else{ctx.fillStyle='rgba(30,40,80,0.85)';ctx.strokeStyle='rgba(0,245,255,0.6)';}
  ctx.lineWidth=2; ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(80,100,140,0.3)';
  for(let i=0;i<3;i++){
    const cx2=x+(Math.sin(seed*3.1+i*4.7)*r*0.35);
    const cy2=y+(Math.cos(seed*2.3+i*5.1)*r*0.35);
    const cr=r*(0.08+0.06*Math.sin(seed+i));
    ctx.beginPath();ctx.arc(cx2,cy2,cr,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle=hit?(hit==='correct'?'#00ff90':'#ff4488'):'#ffffff';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const fs=Math.max(11,Math.min(16,r*0.38));
  ctx.font=`bold ${fs}px 'Share Tech Mono',monospace`;
  const words=text.split(' '),lines=[];let line='';
  const maxW=r*1.5;
  words.forEach(w=>{const t2=line?line+' '+w:w;if(ctx.measureText(t2).width>maxW&&line){lines.push(line);line=w;}else line=t2;});
  if(line)lines.push(line);
  const lh=fs+3;
  lines.forEach((l,i)=>ctx.fillText(l,x,y-(lines.length-1)*lh/2+i*lh));
  ctx.restore();
}

function spawnAsteroids(q){
  asteroids=[];
  const cols=3,spacing=canvas.width/(cols+1);
  const r=Math.min(85,canvas.width*0.11);
  for(let i=0;i<3;i++){
    asteroids.push({x:spacing*(i+1),y:-r-i*40,r,vy:0.8+Math.random()*0.4,seed:Math.random()*100,text:q.opts[i],answerIndex:i,hit:null,hitAlpha:1,active:true});
  }
}

function spawnParticles(x,y,color,n=18){
  for(let i=0;i<n;i++){
    const angle=Math.random()*Math.PI*2,speed=1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,alpha:1,r:2+Math.random()*3,color,life:1});
  }
}

function loadQuestion(){
  if(qIndex>=questions.length){endGame();return;}
  currentQ=questions[qIndex];
  document.getElementById('questionDisplay').textContent=currentQ.q;
  document.getElementById('questionNum').textContent=qIndex+1;
  document.getElementById('progressBar').style.width=((qIndex/30)*100)+'%';
  spawnAsteroids(currentQ);
  waitingForNext=false;
}

function handleHit(ast){
  if(!ast.active||waitingForNext)return;
  const correct=ast.answerIndex===currentQ.a;
  ast.active=false;
  if(correct){
    ast.hit='correct'; score+=100; playCorrect();
    spawnParticles(ast.x,ast.y,'#00ffa0');
    flashMessage='✓ RÄTT!'; flashAlpha=1;
    document.getElementById('scoreDisplay').textContent=score;
  } else {
    ast.hit='wrong'; lives--; playWrong();
    spawnParticles(ast.x,ast.y,'#ff4488');
    flashMessage='✗ FEL'; flashAlpha=1;
    document.getElementById('livesDisplay').textContent=lives;
    missedQuestions.push({...currentQ,yourAnswer:currentQ.opts[ast.answerIndex]});
  }
  asteroids.forEach(a=>{if(a!==ast)a.active=false;});
  waitingForNext=true; nextTimer=90;
  if(lives<=0){setTimeout(endGame,1500);return;}
  qIndex++;
}

function gameLoop(){
  if(!gameActive)return;
  const W=canvas.width,H=canvas.height;
  gctx.fillStyle='#03010a'; gctx.fillRect(0,0,W,H);
  gameStars.forEach(s=>{
    s.y+=s.speed; if(s.y>H){s.y=0;s.x=Math.random()*W;}
    gctx.globalAlpha=s.alpha; gctx.fillStyle='#c8dcff';
    gctx.beginPath(); gctx.arc(s.x,s.y,s.r,0,Math.PI*2); gctx.fill();
  });
  gctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;p.alpha=p.life;
    gctx.globalAlpha=p.alpha;gctx.fillStyle=p.color;
    gctx.beginPath();gctx.arc(p.x,p.y,p.r,0,Math.PI*2);gctx.fill();
  });
  gctx.globalAlpha=1;
  bullets=bullets.filter(b=>b.active&&b.y>-10);
  bullets.forEach(b=>{
    b.y-=b.speed;
    asteroids.forEach(ast=>{
      if(!ast.active)return;
      const dx=b.x-ast.x,dy=b.y-ast.y;
      if(Math.sqrt(dx*dx+dy*dy)<ast.r){b.active=false;handleHit(ast);}
    });
    if(!b.active)return;
    gctx.save();gctx.shadowColor='#00f5ff';gctx.shadowBlur=12;
    const g=gctx.createLinearGradient(b.x,b.y-18,b.x,b.y+4);
    g.addColorStop(0,'rgba(0,245,255,0)');g.addColorStop(0.4,'rgba(0,245,255,0.9)');g.addColorStop(1,'#ffffff');
    gctx.fillStyle=g;gctx.fillRect(b.x-2,b.y-18,4,20);gctx.restore();
  });
  asteroids.forEach(ast=>{
    if(!waitingForNext&&ast.active){
      ast.y+=ast.vy;
      if(ast.y>canvas.height+ast.r){
        ast.active=false;
        if(ast.answerIndex===currentQ.a){
          lives--;playWrong();
          document.getElementById('livesDisplay').textContent=lives;
          missedQuestions.push({...currentQ,yourAnswer:'(ingen träff)'});
          flashMessage='⚠ FÖRBI!';flashAlpha=1;
          asteroids.forEach(a=>{if(a!==ast)a.active=false;});
          waitingForNext=true;nextTimer=90;qIndex++;
          if(lives<=0)setTimeout(endGame,1500);
        }
      }
    }
    if(ast.hit)ast.hitAlpha-=0.02;
    drawAsteroid(gctx,ast);
  });
  if(waitingForNext){nextTimer--;if(nextTimer<=0)loadQuestion();}
  if(flashAlpha>0){
    gctx.save();gctx.globalAlpha=flashAlpha;
    gctx.font="bold 36px 'Orbitron',sans-serif";gctx.textAlign='center';
    const isOk=flashMessage&&flashMessage.includes('RÄTT');
    gctx.fillStyle=isOk?'#00ffa0':'#ff4488';
    gctx.shadowColor=gctx.fillStyle;gctx.shadowBlur=20;
    gctx.fillText(flashMessage,W/2,H/2-30);gctx.restore();
    flashAlpha-=0.015;
  }
  drawShip(gctx,ship.x,ship.y);
  animFrame=requestAnimationFrame(gameLoop);
}

function drawShip(ctx,x,y){
  ctx.save();ctx.translate(x,y);
  const eg=ctx.createRadialGradient(0,22,2,0,22,22);
  eg.addColorStop(0,'rgba(0,200,255,0.8)');eg.addColorStop(1,'rgba(0,100,255,0)');
  ctx.fillStyle=eg;ctx.fillRect(-20,10,40,30);
  const fh=15+Math.sin(Date.now()*0.02)*5;
  const fl=ctx.createLinearGradient(0,20,0,20+fh);
  fl.addColorStop(0,'#00f5ff');fl.addColorStop(0.5,'#0040ff');fl.addColorStop(1,'rgba(0,40,200,0)');
  ctx.fillStyle=fl;ctx.beginPath();ctx.moveTo(-10,20);ctx.lineTo(0,20+fh);ctx.lineTo(10,20);ctx.closePath();ctx.fill();
  const bg=ctx.createLinearGradient(-30,-30,30,30);
  bg.addColorStop(0,'#1a4fff');bg.addColorStop(0.5,'#0a2acc');bg.addColorStop(1,'#cc0033');
  ctx.fillStyle=bg;ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(22,18);ctx.lineTo(10,12);ctx.lineTo(0,16);ctx.lineTo(-10,12);ctx.lineTo(-22,18);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ff0033';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(15,14);ctx.moveTo(0,-20);ctx.lineTo(-15,14);ctx.stroke();
  const cg=ctx.createRadialGradient(-3,-12,1,0,-8,9);
  cg.addColorStop(0,'#80d4ff');cg.addColorStop(1,'#0060cc');
  ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(0,-8,9,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(20,60,200,0.9)';
  ctx.beginPath();ctx.moveTo(-22,18);ctx.lineTo(-40,22);ctx.lineTo(-28,8);ctx.lineTo(-10,10);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(22,18);ctx.lineTo(40,22);ctx.lineTo(28,8);ctx.lineTo(10,10);ctx.closePath();ctx.fill();
  ctx.fillStyle='#cc0033';
  ctx.beginPath();ctx.arc(-32,20,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(32,20,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function prepareUltimate() {
  const allRaw = RAW_SECTORS.flatMap(s => s.qs);
  return shuffle(allRaw).slice(0, 30).map(item => {
    const opts = shuffle([{text:item.correct,isCorrect:true},{text:item.wrong1,isCorrect:false},{text:item.wrong2,isCorrect:false}]);
    const correctIdx = opts.findIndex(o => o.isCorrect);
    return { q:item.q, opts:opts.map(o=>o.text), a:correctIdx, exp:item.exp };
  });
}

function startUltimate(){
  initAudio();
  currentSector=4;
  questions=prepareUltimate();
  qIndex=0;score=0;lives=3;missedQuestions=[];
  document.getElementById('startScreen').style.display='none';
  document.getElementById('reportScreen').style.display='none';
  canvas.style.display='block';
  document.getElementById('hud').classList.add('active');
  document.getElementById('questionDisplay').classList.add('active');
  document.getElementById('scoreDisplay').textContent=0;
  document.getElementById('livesDisplay').textContent=3;
  initGameCanvas();gameActive=true;loadQuestion();gameLoop();
}

function startSector(idx){
  initAudio();
  currentSector=idx;
  questions=prepareQuestions(idx);
  qIndex=0;score=0;lives=3;missedQuestions=[];
  document.getElementById('startScreen').style.display='none';
  document.getElementById('reportScreen').style.display='none';
  canvas.style.display='block';
  document.getElementById('hud').classList.add('active');
  document.getElementById('questionDisplay').classList.add('active');
  document.getElementById('scoreDisplay').textContent=0;
  document.getElementById('livesDisplay').textContent=3;
  initGameCanvas();gameActive=true;loadQuestion();gameLoop();
}

function endGame(){
  gameActive=false;if(animFrame)cancelAnimationFrame(animFrame);
  canvas.style.display='none';
  document.getElementById('hud').classList.remove('active');
  document.getElementById('questionDisplay').classList.remove('active');
  showReport();
}

function showReport(){
  const total=Math.min(qIndex,30),correct=total-missedQuestions.length;
  document.getElementById('reportStats').innerHTML=`
    <div class="stat-box correct"><span class="stat-num">${correct}</span><div class="stat-label">RÄTT SVAR</div></div>
    <div class="stat-box wrong"><span class="stat-num">${missedQuestions.length}</span><div class="stat-label">MISSADE</div></div>
    <div class="stat-box score"><span class="stat-num">${score}</span><div class="stat-label">POÄNG</div></div>`;
  let html='';
  if(missedQuestions.length===0){html=`<div style="text-align:center;color:var(--neon-green);font-size:1.1rem;padding:20px;">🎉 Perfekt resultat! Inga missade frågor.</div>`;}
  else{
    html=`<div class="missed-title">📌 Missade begrepp – förklaringar</div>`;
    missedQuestions.forEach(mq=>{
      html+=`<div class="missed-item"><div class="missed-q">❓ ${mq.q}</div><div class="missed-your">✗ Ditt svar: ${mq.yourAnswer}</div><div class="missed-correct">✓ Rätt svar: ${mq.opts[mq.a]}</div><div class="missed-explain">💡 ${mq.exp}</div></div>`;
    });
  }
  document.getElementById('reportMissed').innerHTML=html;
  document.getElementById('reportScreen').style.display='flex';
  initStars('bgStars2');
}

function showStart(){
  document.getElementById('reportScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
}

window.addEventListener('load',()=>initStars('bgStars'));
window.addEventListener('resize',()=>{if(gameActive){canvas.width=window.innerWidth;canvas.height=window.innerHeight;ship.y=canvas.height-90;}});
</script>
</body>
</html>
