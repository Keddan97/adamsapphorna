<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glosa – GUC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   GUC DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --green:       #568E14;
  --green-dark:  #3A6409;
  --green-mid:   #7CB52A;
  --green-light: #D4EDAA;
  --green-pale:  #EFF7E0;
  --orange:      #DD5900;
  --orange-pale: #FDEEE5;
  --bg:          #F8FCF2;
  --card:        #FFFFFF;
  --ink:         #1A2410;
  --ink2:        #556040;
  --border:      #C6DCA0;
  --niva1:       #cc3947;
  --niva2:       #65337c;
  --niva3:       #2c9aa6;
  --radius:      14px;
  /* active level color (set by JS) */
  --lvl-color:   #cc3947;
  --lvl-dark:    #8c1e28;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  display: flex;
  align-items: stretch;
  justify-content: center;
}

.app-shell {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: 100dvh;
}

/* ── Desktop: full skärm, centrerat innehåll ── */
@media (min-width: 720px) {
  .aura { padding: 16px 24px 28px; }
  .card-scene { height: 320px; }
  .sw-btns { max-width: 360px; }
}

:fullscreen .app-shell,
:-webkit-full-screen .app-shell {
  width: 100vw !important;
  min-height: 100vh;
}

/* ═══════════════════════════════════════════
   GUC HEADER
═══════════════════════════════════════════ */
.guc-header {
  background: var(--green);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 14px 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}
/* Innerbredd på header/footer följer app-shell */
.guc-appname {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  color: #fff;
  letter-spacing: 0.06em;
  line-height: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.guc-div { width: 1px; height: 28px; background: rgba(255,255,255,0.3); flex-shrink: 0; }
.guc-logo {
  height: 36px;
  width: auto;
  flex-shrink: 0;
  display: block;
  vertical-align: bottom;
  line-height: 0;
}
@media (max-width: 479px) {
  .guc-logo { display: none; }
}
.guc-spacer { flex: 1; }

/* Helskärmsknapp */
.fs-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  color: white;
}
.fs-btn:hover { background: rgba(255,255,255,0.28); }
.fs-btn svg { pointer-events: none; }

/* ═══════════════════════════════════════════
   MODE PILL SWITCHER
═══════════════════════════════════════════ */
.mode-bar {
  display: none;
  padding: 10px 14px 0;
  background: var(--bg);
  flex-shrink: 0;
}
.mode-bar.show { display: block; }
.mode-pill-track {
  background: rgba(0,0,0,0.06);
  border-radius: 999px;
  padding: 3px;
  display: flex;
  position: relative;
  gap: 0;
  margin-bottom: 10px;
}
.mode-glider {
  position: absolute;
  top: 3px; left: 3px;
  height: calc(100% - 6px);
  border-radius: 999px;
  background: var(--green);
  transition: transform 0.28s cubic-bezier(0.34,1.2,0.64,1), width 0.28s cubic-bezier(0.34,1.2,0.64,1);
  pointer-events: none;
  z-index: 0;
}
.mode-pill-track button {
  flex: 1;
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 7px 4px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--ink2);
  cursor: pointer;
  position: relative;
  z-index: 1;
  transition: color 0.2s;
  letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent;
}
.mode-pill-track button.active { color: #fff; }

/* ═══════════════════════════════════════════
   MAIN + SCREENS
═══════════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
.screen.active { display: flex; }

/* ═══════════════════════════════════════════
   GUC FOOTER
═══════════════════════════════════════════ */
.guc-footer {
  background: var(--green-dark);
  padding: 9px 16px;
  text-align: center;
  font-size: 0.67rem;
  color: rgba(255,255,255,0.42);
  line-height: 1.4;
  flex-shrink: 0;
}
.guc-footer .vibe { cursor: pointer; text-decoration: none; }

/* ═══════════════════════════════════════════
   LEVEL SELECT SCREEN
═══════════════════════════════════════════ */
#lvl-screen {
  background: var(--bg);
  padding: 32px 22px 24px;
  align-items: center;
  gap: 0;
}
.lvl-intro { text-align: center; margin-bottom: 28px; }
.lvl-intro h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.55rem;
  letter-spacing: 0.07em;
  color: var(--ink);
}
.lvl-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
.lvl-card {
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
  -webkit-tap-highlight-color: transparent;
  border: none;
}
.lvl-card[data-lvl="1"] { background: linear-gradient(135deg, #cc3947 0%, #8c1a25 100%); }
.lvl-card[data-lvl="2"] { background: linear-gradient(135deg, #65337c 0%, #3e1554 100%); }
.lvl-card[data-lvl="3"] { background: linear-gradient(135deg, #2c9aa6 0%, #136870 100%); }
.lvl-card:hover { transform: translateY(-2px); }
.lvl-card:active { transform: scale(0.97); }
.lvl-badge {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: white;
  flex-shrink: 0;
}
.lvl-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: white;
}
.lvl-arrow { margin-left: auto; color: rgba(255,255,255,0.5); font-size: 1.4rem; font-weight: 300; }

/* ═══════════════════════════════════════════
   LOADING / ERROR
═══════════════════════════════════════════ */
.loading-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 14px; padding: 40px;
}
.spinner {
  width: 30px; height: 30px;
  border: 2.5px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap p { font-size: 0.88rem; color: var(--ink2); }

/* ═══════════════════════════════════════════
   CONTENT WRAPPER
═══════════════════════════════════════════ */
.aura {
  background: var(--bg);
  flex: 1; display: flex; flex-direction: column;
  padding: 16px 14px 24px;
  gap: 0; overflow-y: auto;
}

/* ── Search ── */
.aura-search {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.93rem;
  color: var(--ink);
  width: 100%; outline: none;
  transition: border-color 0.2s;
}
.aura-search:focus { border-color: var(--green); }
.aura-search { margin-bottom: 0; }

/* ── Word list ── */
.word-list { display: flex; flex-direction: column; gap: 7px; }
.word-card {
  border-radius: var(--radius);
  padding: 13px 15px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: transform 0.16s cubic-bezier(0.4,0,0.2,1);
  -webkit-tap-highlight-color: transparent;
  background: var(--card);
}
.word-card[data-d="1"] { border: 2px solid var(--niva1); }
.word-card[data-d="2"] { border: 2px solid var(--niva2); }
.word-card[data-d="3"] { border: 2px solid var(--niva3); }
.word-card:hover { transform: translateY(-1px); }
.word-card:active { transform: scale(0.97); }
.word-card strong {
  font-size: 0.97rem; font-weight: 700; color: var(--ink); display: block;
}
.word-card span { font-size: 0.8rem; color: var(--ink2); display: block; margin-top: 1px; }

/* ── Modal ── */
#modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(26,36,16,0.45);
  z-index: 200; align-items: flex-end; justify-content: center;
}
#modal-bg.open { display: flex; }
#modal {
  background: var(--card);
  border-radius: 28px 28px 0 0;
  padding: 24px 22px 40px;
  width: 100%; max-width: 600px; max-height: 76vh; overflow-y: auto;
  position: relative;
  animation: up 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal-strip {
  height: 5px; border-radius: 3px; margin-bottom: 16px;
}
.m-word { font-size: 1.9rem; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
.m-def  { font-size: 0.97rem; line-height: 1.6; color: var(--ink); margin-bottom: 12px; }
.m-ex {
  border-radius: 0 10px 10px 0;
  padding: 9px 13px;
  font-size: 0.88rem; color: var(--green-dark);
  line-height: 1.5; font-style: italic; margin-bottom: 12px;
  display: none;
  background: var(--green-pale);
  border-left: 3px solid var(--green);
}
.m-syns { display: flex; flex-wrap: wrap; gap: 6px; }
.m-syn { background: rgba(0,0,0,0.06); color: var(--lvl-color); border: 1.5px solid var(--lvl-color); border-radius: 999px; padding: 3px 11px; font-size: 0.8rem; font-weight: 600; }

/* ── Swipe / Flashcard ── */
.swipe-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding-bottom: 8px; }
.swipe-wrap .progress-block { width: 100%; align-self: stretch; }
.sw-row { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.sw-stat { font-size: 0.8rem; color: var(--ink2); font-weight: 600; }
.aura-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; }
.aura-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; background: var(--lvl-color); }

.card-scene { width: 100%; height: 290px; perspective: 1000px; cursor: pointer; user-select: none; }
.card-body.swipe-right { animation: swipeRight 0.35s ease forwards; }
.card-body.swipe-left  { animation: swipeLeft  0.35s ease forwards; }
@keyframes swipeRight {
  to { transform: translateX(120%) rotate(12deg); opacity: 0; }
}
@keyframes swipeLeft {
  to { transform: translateX(-120%) rotate(-12deg); opacity: 0; }
}
/* Knapp highlight vid drag */
.sw-btn.sw-hint-right { background: var(--green) !important; color: white !important; transform: scale(1.06); }
.sw-btn.sw-hint-left  { background: var(--orange) !important; color: white !important; transform: scale(1.06); }
.card-body {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.44s cubic-bezier(0.34,1.2,0.64,1);
  position: relative;
}
.card-body.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; text-align: center;
}
.cf { background: linear-gradient(145deg, var(--lvl-color) 0%, var(--lvl-dark) 100%); }
/* Baksida: orange – rörelse/avslöjande */
.cb { background: var(--card); border: 2px solid var(--border); transform: rotateY(180deg); }
.cf-word {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 6vw, 2.5rem);
  color: white; margin-bottom: 8px; line-height: 1.1;
  letter-spacing: 0.04em;
}
.cf-class {
  background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.9);
  border-radius: 999px; padding: 3px 11px;
  font-size: 0.77rem; font-weight: 600; margin-bottom: 18px;
}
.cf-hint { color: rgba(255,255,255,0.6); font-size: 0.8rem; }
.cb-def { font-size: clamp(0.88rem,2.5vw,1.02rem); line-height: 1.55; color: var(--ink); margin-bottom: 10px; font-weight: 500; }
.cb-ex  { font-size: 0.83rem; color: var(--ink2); font-style: italic; line-height: 1.4; }
.cb-syns { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 9px; }
.cb-syn  { background: var(--green-pale); color: var(--green-dark); border-radius: 999px; padding: 3px 9px; font-size: 0.77rem; font-weight: 600; }

.sw-btns { display: flex; gap: 14px; width: 100%; max-width: 290px; }
.sw-btn {
  flex: 1; border-radius: 999px; border: 2px solid;
  padding: 13px; font-family: 'Source Sans 3', sans-serif;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
  transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
  -webkit-tap-highlight-color: transparent;
  background: transparent;
}
.sw-btn:active { transform: scale(0.97); }
.sw-knew { border-color: var(--green); color: var(--green); }
.sw-knew:hover { background: var(--green); color: white; }
.sw-nope { border-color: var(--orange); color: var(--orange); }
.sw-nope:hover { background: var(--orange); color: white; }

/* ── Quiz ── */
.quiz-wrap { display: flex; flex-direction: column; gap: 12px; }
.qz-panel {
  border-radius: var(--radius); padding: 24px; text-align: center;
  background: linear-gradient(145deg, var(--lvl-color) 0%, var(--lvl-dark) 100%);
}
.qz-word  { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.55rem,5vw,2.1rem); color: white; margin-bottom: 0; letter-spacing: 0.04em; text-align: center; }
.qz-prompt { font-size: 0.79rem; color: var(--ink2); text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.qz-opts { display: flex; flex-direction: column; gap: 8px; }
.qz-opt {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 13px 15px; font-size: 0.9rem; line-height: 1.4; text-align: left;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-weight: 500; color: var(--ink);
  transition: all 0.14s; -webkit-tap-highlight-color: transparent;
}
.qz-opt:active:not(.disabled) { transform: scale(0.97); }
.qz-opt:hover:not(.disabled) { border-color: var(--green); background: var(--green-pale); }
.qz-opt.correct { border-color: var(--green); background: var(--green-pale); color: var(--green-dark); font-weight: 700; }
.qz-opt.wrong   { border-color: var(--orange); background: var(--orange-pale); color: var(--orange); }
.qz-opt.disabled { cursor: default; }
#qz-next {
  display: none;
  background: var(--orange); color: white; border: none; border-radius: 999px;
  padding: 13px 24px; font-family: 'Source Sans 3', sans-serif;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%;
  letter-spacing: 0.02em; transition: opacity 0.15s;
}
#qz-next:hover { opacity: 0.87; }
.progress-block { display: flex; flex-direction: column; gap: 8px; }
.score-row { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; color: var(--ink2); }
.score-row em { color: var(--green); font-style: normal; }

/* ── Done panel ── */
.done-panel {
  background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 32px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
}
.done-panel .emoji { font-size: 3.2rem; }
.done-panel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; color: var(--ink); }
.done-panel p { font-size: 0.88rem; color: var(--ink2); }
.done-btn {
  margin-top: 14px; background: var(--green); color: white; border: none;
  border-radius: 999px; padding: 12px 30px;
  font-family: 'Source Sans 3', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.done-btn:hover { opacity: 0.87; }
.empty { text-align: center; padding: 36px 20px; color: var(--ink2); font-size: 0.88rem; }

/* ═══════════════════════════════════════════
   CONTENT-WRAP: centrera innehåll på desktop
═══════════════════════════════════════════ */
.content-wrap {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
@media (min-width: 720px) {
  .mode-bar { padding-left: 0; padding-right: 0; }
  .mode-pill-track { max-width: 600px; margin: 0 auto; }
  .aura { padding: 20px 24px 32px; }
}
</style>
</head>
<body>
<div class="app-shell" id="app-shell">

<!-- GUC HEADER -->
<header class="guc-header">
  <span class="guc-appname" onclick="goHome()">Glosa</span>
  <div class="guc-div"></div>
  <img class="guc-logo" src="A_GUC%20VIT.png" onerror="this.style.display='none'; document.getElementById('guc-logo-fallback').style.display='block';" alt="GUC Logo">
  <span id="guc-logo-fallback" style="display:none; font-family:'Bebas Neue', sans-serif; font-size:1.8rem; color:#fff; letter-spacing:0.05em;">GUC</span>
  <div class="guc-spacer"></div>
  <button class="fs-btn" id="fs-btn" onclick="toggleFullscreen()" title="Helskärm">
    <svg id="fs-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
  </button>
</header>

<!-- MODE PILL SWITCHER (visible only after level picked) -->
<div class="mode-bar" id="mode-bar">
  <div class="mode-pill-track" id="pill-track">
    <div class="mode-glider" id="pill-glider"></div>
    <button id="mb-words" class="active" onclick="goTab('words')">Glosor</button>
    <button id="mb-swipe"               onclick="goTab('swipe')">Flashcard</button>
    <button id="mb-quiz"                onclick="goTab('quiz')">Quiz</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEVEL SCREEN -->
  <div class="screen active" id="lvl-screen">
    <div class="lvl-intro"><h2>Välj din niveau</h2></div>
    <div class="lvl-cards">
      <div class="lvl-card" data-lvl="1" onclick="pickLevel(1)">
        <div class="lvl-badge">1</div>
        <span class="lvl-label">Svenska nivå 1</span>
        <span class="lvl-arrow">›</span>
      </div>
      <div class="lvl-card" data-lvl="2" onclick="pickLevel(2)">
        <div class="lvl-badge">2</div>
        <span class="lvl-label">Svenska nivå 2</span>
        <span class="lvl-arrow">›</span>
      </div>
      <div class="lvl-card" data-lvl="3" onclick="pickLevel(3)">
        <div class="lvl-badge">3</div>
        <span class="lvl-label">Svenska nivå 3</span>
        <span class="lvl-arrow">›</span>
      </div>
    </div>
  </div>

  <!-- WORDS SCREEN -->
  <div class="screen" id="words-screen">
    <div class="aura">
      <div class="content-wrap">
        <input class="aura-search" id="srch" type="text" placeholder="Sök bland glosorna…" oninput="renderWords()" autocomplete="off">
        <div class="word-list" id="word-list"></div>
      </div>
    </div>
  </div>

  <!-- SWIPE SCREEN -->
  <div class="screen" id="swipe-screen">
    <div class="aura" id="swipe-aura">
      <div class="content-wrap"><div class="swipe-wrap">
        <div class="progress-block">
          <div class="sw-row">
            <span class="sw-stat" id="sw-count">0 / 0</span>
            <span class="sw-stat" id="sw-score">✓ 0 &nbsp;✕ 0</span>
          </div>
          <div class="aura-bar"><div class="aura-fill" id="sw-prog" style="width:0%"></div></div>
        </div>
        <div class="card-scene" id="card-scene">
          <div class="card-body" id="card-body">
            <div class="card-face cf">
              <div class="cf-class" id="cf-cls"></div>
              <div class="cf-word" id="cf-word">—</div>
              <div class="cf-hint">Tryck för att se definitionen</div>
            </div>
            <div class="card-face cb">
              <div class="cb-def" id="cb-def"></div>
              <div class="cb-ex"  id="cb-ex"></div>
              <div class="cb-syns" id="cb-syns"></div>
            </div>
          </div>
        </div>
        <div class="sw-btns">
          <button class="sw-btn sw-nope" onclick="swipe(false)">Kunde ej</button>
          <button class="sw-btn sw-knew" onclick="swipe(true)">Kunde det</button>
        </div>
      </div></div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quiz-screen">
    <div class="aura">
      <div class="content-wrap">
        <div class="progress-block">
          <div class="sw-row">
            <span class="sw-stat"><span id="qz-num">1</span> / <span id="qz-tot">10</span></span>
            <span class="sw-stat" id="qz-pts">0 rätt</em>
          </div>
          <div class="aura-bar"><div class="aura-fill" id="qz-prog" style="width:0%"></div></div>
        </div>
        <div class="quiz-wrap" id="qz-wrap"></div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<!-- GUC FOOTER -->
<footer class="guc-footer">
  Göinge utbildningscenter · Östra Göinge kommun · Skapad av Adam Kedert ·
  <span class="vibe" id="vibe">Vibekodad med Claude (Anthropic)</span>
</footer>

<!-- MODAL -->
<div id="modal-bg" onclick="closeModalOut(event)">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-strip" id="m-strip"></div>
    <div class="m-word" id="m-word"></div>
    <div class="m-def"  id="m-def"></div>
    <div class="m-ex"   id="m-ex"></div>
    <div class="m-syns" id="m-syns"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyz7_YiIj_9Qh732VyHAW_agqdD1AhVP0tcWSQz7NboSebKx2k9yY-mbqM1VZy_I-UIHQ/exec';

const NIV = {
  1: { col: '#cc3947', dark: '#8c1e28', name: 'Svenska nivå 1' },
  2: { col: '#65337c', dark: '#3e1a4e', name: 'Svenska nivå 2' },
  3: { col: '#2c9aa6', dark: '#1a6570', name: 'Svenska nivå 3' },
};

let lvl    = 0;
let W      = [];
let swQ=[], swI=0, swK=0, swM=0, swFlip=false;
let qzQ=[], qzI=0, qzS=0, qzAns=false;

function pool() { return W.filter(x => x.d === lvl); }

// ════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════
async function fetchWords(level) {
  showLoadingInWords();
  try {
    const url = APPS_SCRIPT_URL + '?action=words';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const all = data.words || [];
    W = all
      .filter(item => parseInt(item.difficulty) === level && item.wordClass && item.wordClass.trim() !== '')
      .map(item => ({
        id:  item.id,
        w:   item.word        || '',
        cls: item.wordClass,
        def: item.definition  || '',
        ex:  item.example     || '',
        syn: Array.isArray(item.synonyms) ? item.synonyms : [],
        d:   parseInt(item.difficulty) || level,
      }));

    if (W.length === 0) {
      showError('Inga ord med ordklass hittades för nivå ' + level + '.<br><small>Kontrollera att kolumn "Svårighetsgrad" innehåller ' + level + ' och "Ordklass" är ifylld.</small>');
      return;
    }
    renderWords();
    initSwipe();
    initQuiz();
  } catch (err) {
    showError('Kunde inte hämta glosor.<br><small>' + err.message + '</small>');
  }
}

function showLoadingInWords() {
  document.getElementById('word-list').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><p>Hämtar glosor…</p></div>';
}
function showError(msg) {
  document.getElementById('word-list').innerHTML =
    '<div class="empty" style="color:var(--orange)">' + msg + '</div>';
}

// ════════════════════════════════════════════
// PILL SWITCHER
// ════════════════════════════════════════════
function updateGlider(tabName) {
  const tabs  = ['words', 'swipe', 'quiz'];
  const idx   = tabs.indexOf(tabName);
  const track = document.getElementById('pill-track');
  const btns  = track.querySelectorAll('button');
  const glider= document.getElementById('pill-glider');
  const btn   = btns[idx];
  glider.style.width     = btn.offsetWidth + 'px';
  glider.style.transform = 'translateX(' + btn.offsetLeft + 'px)';
  btns.forEach((b,i) => b.classList.toggle('active', i === idx));
}

// ════════════════════════════════════════════
// LEVEL + NAV
// ════════════════════════════════════════════
function pickLevel(n) {
  lvl = n;
  document.documentElement.style.setProperty('--lvl-color', NIV[n].col);
  document.documentElement.style.setProperty('--lvl-dark',  NIV[n].dark);
  document.getElementById('mode-bar').classList.add('show');
  showSc('words-screen');
  updateGlider('words');
  document.getElementById('mb-words').classList.add('active');
  fetchWords(n);
}

function goHome() {
  lvl = 0;
  W   = [];
  document.getElementById('mode-bar').classList.remove('show');
  showSc('lvl-screen');
}

function showSc(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goTab(tab) {
  showSc(tab + '-screen');
  updateGlider(tab);
  if (tab === 'words') renderWords();
  if (tab === 'swipe') initSwipe();
  if (tab === 'quiz')  initQuiz();
}

window.addEventListener('load', () => {
  if (lvl) updateGlider('words');
});

// ════════════════════════════════════════════
// WORDS
// ════════════════════════════════════════════
function renderWords() {
  const q    = (document.getElementById('srch').value || '').trim().toLowerCase();
  const list = document.getElementById('word-list');
  let words  = pool();
  if (q) words = words.filter(x =>
    x.w.toLowerCase().includes(q) || x.def.toLowerCase().includes(q));
  if (!words.length) {
    list.innerHTML = '<div class="empty">Inga ord hittades.</div>';
    return;
  }
  list.innerHTML = words.map(x => `
    <div class="word-card" data-d="${x.d}" onclick="openModal(${x.id})">
      <div style="flex:1">
        <strong>${x.w}</strong>
        <span>${x.def.length > 62 ? x.def.slice(0,59) + '…' : x.def}</span>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════
function openModal(id) {
  const x = W.find(w => w.id === id); if (!x) return;
  const col = NIV[x.d] ? NIV[x.d].col : '#568E14';
  document.getElementById('m-strip').style.background = col;
  document.getElementById('m-word').textContent = x.w;
  document.getElementById('m-def').textContent  = x.def;
  const ex = document.getElementById('m-ex');
  if (x.ex) { ex.textContent = '„' + x.ex + '"'; ex.style.display = ''; }
  else ex.style.display = 'none';
  document.getElementById('m-syns').innerHTML = x.syn.length
    ? x.syn.map(s => `<span class="m-syn">${s}</span>`).join('') : '';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal()     { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalOut(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

// ════════════════════════════════════════════
// SWIPE / FLASHCARD
// ════════════════════════════════════════════
function initSwipe() {
  const p = pool();
  swQ = [...p].sort(() => Math.random() - .5).slice(0, Math.min(20, p.length));
  swI = 0; swK = 0; swM = 0; swFlip = false;
  const aura = document.getElementById('swipe-aura');
  if (!document.getElementById('card-body')) {
    aura.innerHTML = `
      <div class="swipe-wrap">
        <div class="progress-block">
          <div class="sw-row">
            <span class="sw-stat" id="sw-count">0 / 0</span>
            <span class="sw-stat" id="sw-score">✓ 0 &nbsp;✕ 0</span>
          </div>
          <div class="aura-bar"><div class="aura-fill" id="sw-prog" style="width:0%"></div></div>
        </div>
        <div class="card-scene" id="card-scene">
          <div class="card-body" id="card-body">
            <div class="card-face cf">
              <div class="cf-class" id="cf-cls"></div>
              <div class="cf-word" id="cf-word">—</div>
              <div class="cf-hint">Tryck för att se definitionen</div>
            </div>
            <div class="card-face cb">
              <div class="cb-def" id="cb-def"></div>
              <div class="cb-ex"  id="cb-ex"></div>
              <div class="cb-syns" id="cb-syns"></div>
            </div>
          </div>
        </div>
        <div class="sw-btns">
          <button class="sw-btn sw-nope" onclick="swipe(false)">Kunde ej</button>
          <button class="sw-btn sw-knew" onclick="swipe(true)">Kunde det</button>
        </div>
      </div>`;
  }
  renderCard();
}
function renderCard() {
  if (swI >= swQ.length) { showSwipeDone(); return; }
  const x   = swQ[swI];
  const tot = swQ.length;
  const body = document.getElementById('card-body');
  if (!body) return;
  // Rensa animation och inline-style så kortet syns igen
  body.classList.remove('flipped', 'swipe-right', 'swipe-left'); swFlip = false;
  body.style.transform = '';
  body.style.opacity = '';
  document.getElementById('cf-cls').textContent  = x.cls;
  document.getElementById('cf-word').textContent = x.w;
  document.getElementById('cb-def').textContent  = x.def;
  document.getElementById('cb-ex').textContent   = x.ex ? '„' + x.ex + '"' : '';
  document.getElementById('cb-syns').innerHTML   = x.syn.length
    ? x.syn.map(s => `<span class="cb-syn">${s}</span>`).join('') : '';
  document.getElementById('sw-count').textContent = (swI + 1) + ' / ' + tot;
  document.getElementById('sw-score').textContent = 'Kunde: ' + swK + '  Ej: ' + swM;
  document.getElementById('sw-prog').style.width  = (swI / tot * 100) + '%';
}
function flipCard() {
  swFlip = !swFlip;
  document.getElementById('card-body').classList.toggle('flipped', swFlip);
}
function swipe(k) {
  const body = document.getElementById('card-body');
  if (!body) { if (k) swK++; else swM++; swI++; renderCard(); return; }
  const knew = document.querySelector('.sw-knew');
  const nope = document.querySelector('.sw-nope');
  // Rensa knapp-highlights direkt
  if (knew) knew.classList.remove('sw-hint-right');
  if (nope) nope.classList.remove('sw-hint-left');
  body.style.transform = '';
  body.classList.add(k ? 'swipe-right' : 'swipe-left');
  setTimeout(() => {
    if (k) swK++; else swM++;
    swI++;
    renderCard();
  }, 300);
}

// ── Touch/swipe på kortet ──
(function() {
  let tx0, ty0, dragging = false, dx = 0;
  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    tx0 = t.clientX; ty0 = t.clientY; dragging = true; dx = 0;
  }
  function onMove(e) {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    dx = t.clientX - tx0;
    const dy = Math.abs(t.clientY - ty0);
    if (Math.abs(dx) < 8 && dy < 8) return;
    if (dy > Math.abs(dx)) { dragging = false; return; } // vertikal scroll
    e.preventDefault();
    const body = document.getElementById('card-body');
    if (!body) return;
    // Rotera kortet lätt med draget
    body.style.transform = (body.classList.contains('flipped') ? 'rotateY(180deg) ' : '') +
      `translateX(${dx}px) rotate(${dx * 0.04}deg)`;
    // Highlighta knapp
    const knew = document.querySelector('.sw-knew');
    const nope = document.querySelector('.sw-nope');
    if (knew && nope) {
      knew.classList.toggle('sw-hint-right', dx > 40);
      nope.classList.toggle('sw-hint-left',  dx < -40);
    }
  }
  function onEnd(e) {
    if (!dragging) return; dragging = false;
    const body = document.getElementById('card-body');
    if (!body) return;
    body.style.transform = '';
    const knew = document.querySelector('.sw-knew');
    const nope = document.querySelector('.sw-nope');
    if (knew) knew.classList.remove('sw-hint-right');
    if (nope) nope.classList.remove('sw-hint-left');
    if (dx > 80)         swipe(true);
    else if (dx < -80)   swipe(false);
    else if (Math.abs(dx) < 8) flipCard(); // tap
  }
  document.addEventListener('touchstart', e => {
    if (e.target.closest('.card-scene')) onStart(e);
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (dragging) onMove(e);
  }, { passive: false });
  document.addEventListener('touchend', e => {
    if (dragging) onEnd(e);
  });
  document.addEventListener('mousedown', e => {
    if (e.target.closest('.card-scene')) onStart(e);
  });
  document.addEventListener('mousemove', e => {
    if (dragging) onMove(e);
  });
  document.addEventListener('mouseup', e => {
    if (dragging) onEnd(e);
  });
})();
function showSwipeDone() {
  const pct = swQ.length ? Math.round(swK / swQ.length * 100) : 0;
  const em  = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
  document.getElementById('swipe-aura').innerHTML = `
    <div class="done-panel">
      <div class="emoji">${em}</div>
      <h2>Klart!</h2>
      <p>Kunde: <strong>${swK}</strong> &nbsp;·&nbsp; Kunde ej: <strong>${swM}</strong></p>
      <p style="font-size:.82rem;color:var(--ink2)">${pct}% rätt på första försöket</p>
      <button class="done-btn" onclick="goTab('swipe')">Kör igen</button>
    </div>`;
}

// ════════════════════════════════════════════
// QUIZ
// ════════════════════════════════════════════
function initQuiz() {
  const p = pool();
  if (p.length < 4) {
    document.getElementById('qz-wrap').innerHTML = '<div class="empty">Behöver minst 4 ord.</div>';
    return;
  }
  qzQ = [...p].sort(() => Math.random() - .5).slice(0, Math.min(10, p.length));
  qzI = 0; qzS = 0; qzAns = false;
  renderQz();
}
function renderQz() {
  if (qzI >= qzQ.length) { showQzDone(); return; }
  const x      = qzQ[qzI];
  const p      = pool();
  const wrongs = p.filter(w => w.id !== x.id).sort(() => Math.random() - .5).slice(0, 3);
  const opts   = [...wrongs, x].sort(() => Math.random() - .5);
  const ci     = opts.indexOf(x); qzAns = false;
  document.getElementById('qz-num').textContent  = qzI + 1;
  document.getElementById('qz-tot').textContent  = qzQ.length;
  document.getElementById('qz-pts').textContent  = qzS + ' rätt';
  document.getElementById('qz-prog').style.width = (qzI / qzQ.length * 100) + '%';
  document.getElementById('qz-wrap').innerHTML = `
    <div class="qz-panel">
      <div class="qz-word">${x.w}</div>
    </div>
    <div class="qz-prompt">Välj rätt definition</div>
    <div class="qz-opts">
      ${opts.map((o,i) => `<button class="qz-opt" onclick="ansQ(${i},${ci},this)">${o.def}</button>`).join('')}
    </div>
    <button id="qz-next" onclick="nextQz()">Nästa →</button>`;
}
function ansQ(sel, ci, btn) {
  if (qzAns) return; qzAns = true;
  document.querySelectorAll('.qz-opt').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === ci)  el.classList.add('correct');
    else if (i === sel) el.classList.add('wrong');
  });
  if (sel === ci) qzS++;
  document.getElementById('qz-pts').textContent = qzS + ' rätt';
  document.getElementById('qz-next').style.display = 'block';
}
function nextQz() { qzI++; renderQz(); }
function showQzDone() {
  const pct = Math.round(qzS / qzQ.length * 100);
  const em  = pct >= 80 ? '🏆' : pct >= 50 ? '💪' : '📚';
  document.getElementById('qz-prog').style.width = '100%';
  document.getElementById('qz-pts').textContent  = qzS + '/' + qzQ.length + ' rätt';
  document.getElementById('qz-wrap').innerHTML = `
    <div class="done-panel">
      <div class="emoji">${em}</div>
      <h2>${qzS} av ${qzQ.length} rätt</h2>
      <p>${pct}% — ${pct >= 80 ? 'Utmärkt!' : pct >= 50 ? 'Bra jobbat!' : 'Fortsätt öva!'}</p>
      <button class="done-btn" onclick="initQuiz()">Nytt quiz</button>
    </div>`;
}

// ════════════════════════════════════════════
// FULLSCREEN
// ════════════════════════════════════════════
const ICON_EXPAND  = `<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>`;
const ICON_COMPRESS = `<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>`;

function toggleFullscreen() {
  const el = document.getElementById('app-shell');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el);
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
}
function updateFsIcon() {
  const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.getElementById('fs-icon').innerHTML = inFs ? ICON_COMPRESS : ICON_EXPAND;
}
document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);

// ════════════════════════════════════════════
// FOOTER EASTER EGG
// ════════════════════════════════════════════
let vc = 0, vt;
document.getElementById('vibe').addEventListener('click', () => {
  vc++; clearTimeout(vt); vt = setTimeout(() => vc = 0, 900);
  if (vc >= 3) { vc = 0; alert('Admin-vy ej implementerad i denna version.'); }
});
</script>
</div><!-- /app-shell -->
