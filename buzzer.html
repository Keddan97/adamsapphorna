<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Buzzer – GUC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:        #568E14;
  --green-dark:   #3A6409;
  --green-mid:    #7CB52A;
  --green-light:  #D4EDAA;
  --green-pale:   #EFF7E0;
  --orange:       #DD5900;
  --orange-pale:  #FDEEE5;
  --bg:           #F8FCF2;
  --card:         #FFFFFF;
  --ink:          #1A2410;
  --ink2:         #556040;
  --border:       #C6DCA0;
  --radius:       14px;
}

html, body {
  height: 100%;
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--ink);
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== HEADER ===== */
header {
  background: var(--green);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.header-logo {
  height: 38px;
  width: auto;
  display: block;
  mix-blend-mode: screen;
}

.header-divider {
  width: 1.5px;
  height: 32px;
  background: rgba(255,255,255,0.3);
  flex-shrink: 0;
}

.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 0.12em;
  color: #fff;
  line-height: 1;
}

.header-spacer { flex: 1; }

.fullscreen-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}
.fullscreen-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }

@media (max-width: 480px) {
  .header-logo, #header-divider { display: none; }
}

/* ===== MAIN ===== */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
}

/* ===== FOOTER ===== */
footer {
  background: var(--green-dark);
  padding: 10px 16px;
  text-align: center;
  flex-shrink: 0;
}

footer p {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.04em;
  line-height: 1.5;
}

footer .footer-clickable {
  cursor: pointer;
  transition: color 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
footer .footer-clickable:hover { color: rgba(255,255,255,0.7); }

/* ===== CHOOSE SCREEN ===== */
#choose-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  width: 100%;
  max-width: 480px;
}

.choose-heading {
  text-align: center;
}

.choose-heading h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.25em;
  color: var(--ink2);
  text-transform: uppercase;
}

.choose-heading p {
  font-size: 0.9rem;
  color: var(--ink2);
  margin-top: 4px;
}

.team-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
}

.team-btn {
  position: relative;
  padding: 22px 16px 18px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #fff;
  outline: none;
  transition: transform 0.12s, opacity 0.12s;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

.team-btn:hover { opacity: 0.9; transform: translateY(-2px); }
.team-btn:active { transform: scale(0.97) translateY(0); }

.team-emoji {
  display: block;
  font-size: 2rem;
  margin-bottom: 6px;
  font-family: initial;
  font-weight: normal;
}

/* ===== BUZZER SCREEN ===== */
#buzzer-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  gap: 20px;
  position: relative;
}

.buzzer-screen-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

.back-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 440px;
}

.back-btn {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--ink2);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 18px;
  border-radius: 50px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:hover {
  color: var(--green);
  border-color: var(--green);
  background: var(--green-pale);
}

.lag-tag {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink2);
  background: var(--green-pale);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 5px 16px;
}

/* The buzzer button */
.buzzer-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
}

.buzzer {
  position: relative;
  width: min(68vw, 68vh, 340px);
  height: min(68vw, 68vh, 340px);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  background: transparent;
}

/* Shadow base (stays put) */
.buzzer::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(0,0,0,0.18);
  transform: translateY(8px) scale(0.92);
  filter: blur(12px);
  transition: opacity 0.1s;
}

.buzzer-inner {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 6px;
  transition: transform 0.08s, filter 0.08s;
  /* rim lighting */
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.28), inset 0 -3px 0 rgba(0,0,0,0.2);
}

/* Pressed */
.buzzer.pressed .buzzer-inner { transform: translateY(6px); filter: brightness(0.92); }
.buzzer.pressed::before { opacity: 0.4; transform: translateY(2px) scale(0.88); }

.buzzer-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 7vw, 3rem);
  letter-spacing: 0.35em;
  padding-left: 0.35em;
  color: rgba(255,255,255,0.95);
  pointer-events: none;
  text-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.buzzer-icon {
  font-size: clamp(2rem, 6vw, 2.6rem);
  pointer-events: none;
  font-family: initial;
}

/* ===== FLASH OVERLAY ===== */
#flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  z-index: 5;
  transition: opacity 0.06s;
}
#flash.show { opacity: 0.15; transition: opacity 0s; }

/* ===== MODAL BASE ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--card);
  border-radius: var(--radius);
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px 24px;
  border: 1.5px solid var(--border);
}

.modal h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.15em;
  color: var(--green);
  margin-bottom: 20px;
}

/* ===== PASSWORD MODAL ===== */
#pw-modal input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1rem;
  color: var(--ink);
  background: var(--bg);
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.15s;
}
#pw-modal input:focus { border-color: var(--green); }

#pw-error {
  color: #c0392b;
  font-size: 0.85rem;
  margin-bottom: 10px;
  display: none;
}

.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn-primary {
  background: var(--green);
  color: #fff;
  border: none;
  padding: 9px 24px;
  border-radius: 50px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.87; }

.btn-secondary {
  background: none;
  color: var(--ink2);
  border: 1.5px solid var(--border);
  padding: 9px 20px;
  border-radius: 50px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-secondary:hover { border-color: var(--green); color: var(--green); }

/* ===== TEACHER MODAL ===== */
#teacher-modal .modal { max-width: 560px; }

.teacher-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink2);
  margin-bottom: 10px;
  margin-top: 20px;
  padding-bottom: 6px;
  border-bottom: 1.5px solid var(--border);
}
.teacher-section-title:first-child { margin-top: 0; }

.count-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.count-row label {
  font-size: 0.9rem;
  color: var(--ink2);
  font-weight: 500;
}

.count-row input[type=range] {
  flex: 1;
  accent-color: var(--green);
}

.count-val {
  font-size: 1rem;
  font-weight: 700;
  color: var(--green);
  min-width: 20px;
  text-align: center;
}

/* Team editor */
.team-editor-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.team-editor-item {
  display: grid;
  grid-template-columns: auto 1fr 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 12px;
  background: var(--green-pale);
  border: 1.5px solid var(--border);
  border-radius: 10px;
}

.team-color-preview {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.15);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.team-color-preview input[type=color] {
  position: absolute;
  inset: -4px;
  width: calc(100% + 8px);
  height: calc(100% + 8px);
  opacity: 0;
  cursor: pointer;
  border: none;
  padding: 0;
}

.team-editor-input {
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  background: white;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.team-editor-input:focus { border-color: var(--green); }

.sound-select {
  padding: 7px 8px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  color: var(--ink);
  background: white;
  outline: none;
  cursor: pointer;
  width: 100%;
}

.emoji-btn {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 38px;
  height: 38px;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
  flex-shrink: 0;
  font-family: initial;
}
.emoji-btn:hover { border-color: var(--green); }

/* emoji picker popup */
.emoji-picker {
  position: fixed;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  z-index: 200;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  display: none;
}
.emoji-picker.open { display: grid; }

.emoji-option {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.1s;
  font-family: initial;
}
.emoji-option:hover { background: var(--green-pale); }

/* Apply btn row */
.apply-row {
  margin-top: 22px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

#choose-screen { animation: fadeIn 0.4s ease forwards; }
</style>
</head>

</div>

<script>
// ===== AUDIO =====
let ctx;
function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  return ctx;
}

const soundDefs = {
  chime: {
    label: 'Chime (glad)',
    play: () => {
      const c = getCtx(), t = c.currentTime;
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, t + i*0.07);
        g.gain.setValueAtTime(0, t + i*0.07);
        g.gain.linearRampToValueAtTime(0.28, t + i*0.07 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.07 + 0.4);
        o.connect(g); g.connect(c.destination);
        o.start(t + i*0.07); o.stop(t + i*0.07 + 0.5);
      });
    }
  },
  blip: {
    label: 'Blip (sci-fi)',
    play: () => {
      const c = getCtx(), t = c.currentTime;
      [440, 880].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(freq, t + i*0.12);
        o.frequency.exponentialRampToValueAtTime(freq*0.7, t + i*0.12+0.18);
        g.gain.setValueAtTime(0.15, t + i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.12+0.22);
        o.connect(g); g.connect(c.destination);
        o.start(t + i*0.12); o.stop(t + i*0.12+0.3);
      });
    }
  },
  buzzer: {
    label: 'Buzzer (spelshow)',
    play: () => {
      const c = getCtx(), t = c.currentTime;
      const o = c.createOscillator(), o2 = c.createOscillator(), g = c.createGain();
      o.type = 'sawtooth'; o2.type = 'sawtooth';
      o.frequency.setValueAtTime(180, t);
      o.frequency.setValueAtTime(160, t+0.1);
      o.frequency.setValueAtTime(180, t+0.2);
      o2.frequency.setValueAtTime(181.5, t);
      g.gain.setValueAtTime(0.22, t);
      g.gain.setValueAtTime(0.22, t+0.28);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.45);
      o.connect(g); o2.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+0.5);
      o2.start(t); o2.stop(t+0.5);
    }
  },
  alarm: {
    label: 'Alarm (siren)',
    play: () => {
      const c = getCtx(), t = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(880, t);
      o.frequency.exponentialRampToValueAtTime(440, t+0.18);
      o.frequency.setValueAtTime(880, t+0.25);
      o.frequency.exponentialRampToValueAtTime(440, t+0.43);
      g.gain.setValueAtTime(0.25, t);
      g.gain.setValueAtTime(0.25, t+0.42);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.55);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+0.6);
    }
  },
  ping: {
    label: 'Ping (enkel)',
    play: () => {
      const c = getCtx(), t = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1200, t);
      o.frequency.exponentialRampToValueAtTime(900, t+0.25);
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+0.5);
    }
  },
  fanfare: {
    label: 'Fanfar (vinnare)',
    play: () => {
      const c = getCtx(), t = c.currentTime;
      [[523,0],[659,0.1],[784,0.2],[1047,0.3],[1047,0.42],[1047,0.54]].forEach(([freq,dt]) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'triangle';
        o.frequency.setValueAtTime(freq, t+dt);
        g.gain.setValueAtTime(0, t+dt);
        g.gain.linearRampToValueAtTime(0.25, t+dt+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t+dt+0.18);
        o.connect(g); g.connect(c.destination);
        o.start(t+dt); o.stop(t+dt+0.2);
      });
    }
  }
};

// ===== TEAM DATA =====
const defaultTeams = [
  { name: 'Grönt lag',  emoji: '🏆', color: '#15803d', sound: 'chime'  },
  { name: 'Blått lag',  emoji: '⚡', color: '#1d4ed8', sound: 'blip'   },
  { name: 'Gult lag',   emoji: '🌟', color: '#a16207', sound: 'buzzer' },
  { name: 'Rött lag',   emoji: '🔥', color: '#b91c1c', sound: 'alarm'  },
  { name: 'Lila lag',   emoji: '👑', color: '#7e22ce', sound: 'fanfare'},
  { name: 'Cyan lag',   emoji: '💎', color: '#0e7490', sound: 'ping'   },
];

let teams = JSON.parse(localStorage.getItem('buzzer_teams') || 'null') || defaultTeams.slice(0,4);
let activeCount = teams.length;
let currentTeam = null;

// ===== RENDER CHOOSE SCREEN =====
function renderChooseScreen() {
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  const active = teams.slice(0, activeCount);
  // responsive columns
  grid.style.gridTemplateColumns = active.length <= 2 ? '1fr 1fr' :
    active.length === 3 ? '1fr 1fr 1fr' :
    active.length <= 4 ? '1fr 1fr' :
    active.length === 5 ? 'repeat(3, 1fr)' : '1fr 1fr 1fr';

  active.forEach((team, i) => {
    const btn = document.createElement('button');
    btn.className = 'team-btn';
    btn.style.background = team.color;
    // dark text for very light colors
    const isLight = isLightColor(team.color);
    btn.style.color = isLight ? '#1a0a00' : '#fff';
    btn.innerHTML = `<span class="team-emoji">${team.emoji}</span>${team.name}`;
    btn.addEventListener('click', () => startBuzzer(i));
    grid.appendChild(btn);
  });
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 160;
}

// ===== BUZZER =====
function startBuzzer(idx) {
  currentTeam = idx;
  const team = teams[idx];

  document.getElementById('lag-label').textContent = team.name;
  document.getElementById('buzzer-icon').textContent = team.emoji;

  const buzzerEl = document.getElementById('buzzer');
  buzzerEl.style.background = 'none';
  const inner = buzzerEl.querySelector('.buzzer-inner');
  inner.style.background = `radial-gradient(circle at 35% 35%, ${lighten(team.color, 40)}, ${team.color} 70%)`;
  inner.style.boxShadow = `inset 0 2px 0 rgba(255,255,255,0.28), inset 0 -3px 0 rgba(0,0,0,0.2), 0 0 60px ${team.color}66`;

  const isLight = isLightColor(team.color);
  const buzzerText = buzzerEl.querySelector('.buzzer-text');
  buzzerText.style.color = isLight ? 'rgba(30,10,0,0.85)' : 'rgba(255,255,255,0.95)';
  const buzzerIcon = buzzerEl.querySelector('.buzzer-icon');
  buzzerIcon.style.filter = isLight ? 'brightness(0.4)' : 'none';

  document.getElementById('flash').style.background = team.color;
  document.body.style.background = darken(team.color, 0.92);

  document.getElementById('choose-screen').style.display = 'none';
  const bs = document.getElementById('buzzer-screen');
  bs.style.display = 'flex';

  getCtx().resume();
}

function goBack() {
  document.getElementById('buzzer-screen').style.display = 'none';
  document.getElementById('choose-screen').style.display = 'flex';
  document.body.style.background = 'var(--bg)';
  currentTeam = null;
}

function lighten(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}

function darken(hex, factor) {
  // make a very dark version for bg
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  // mix toward #0a0a0f
  r = Math.round(r * (1-factor) + 10 * factor);
  g = Math.round(g * (1-factor) + 10 * factor);
  b = Math.round(b * (1-factor) + 15 * factor);
  return `rgb(${r},${g},${b})`;
}

let canBuzz = true;

function buzz() {
  if (!canBuzz || currentTeam === null) return;
  canBuzz = false;

  const team = teams[currentTeam];
  getCtx().resume().then(() => {
    if (soundDefs[team.sound]) soundDefs[team.sound].play();
  });

  const buzzer = document.getElementById('buzzer');
  const flash = document.getElementById('flash');
  buzzer.classList.add('pressed');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 130);
}

function releaseBuzz() {
  document.getElementById('buzzer').classList.remove('pressed');
  setTimeout(() => { canBuzz = true; }, 280);
}

// ===== FULLSCREEN =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

// ===== FOOTER TRIPLE-CLICK =====
let footerClicks = 0, footerTimer = null;
document.getElementById('footer-trigger').addEventListener('click', () => {
  footerClicks++;
  if (footerTimer) clearTimeout(footerTimer);
  footerTimer = setTimeout(() => { footerClicks = 0; }, 700);
  if (footerClicks >= 3) {
    footerClicks = 0;
    openPwModal();
  }
});

// ===== PASSWORD =====
function openPwModal() {
  document.getElementById('pw-modal').classList.add('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function closePwModal() {
  document.getElementById('pw-modal').classList.remove('open');
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === 'vänligkvartersspindel') {
    closePwModal();
    openTeacherModal();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// ===== TEACHER MODAL =====
const EMOJIS = ['🏆','⚡','🌟','🔥','👑','💎','🎯','🚀','🎮','🎲','🧠','💥','🌈','🦁','🐉','🦊','🎸','🎺','🥁','🔔','⚽','🏀','🎪','🌊'];

let openEmojiTarget = null;

function openTeacherModal() {
  // sync count
  document.getElementById('count-range').value = activeCount;
  document.getElementById('count-display').textContent = activeCount;
  renderTeamEditor();
  document.getElementById('teacher-modal').classList.add('open');
}

function closeTeacherModal() {
  document.getElementById('teacher-modal').classList.remove('open');
  closeEmojiPicker();
}

function updateCount(val) {
  activeCount = parseInt(val);
  document.getElementById('count-display').textContent = val;
  // fill defaults if needed
  while (teams.length < activeCount) {
    teams.push({...defaultTeams[teams.length % defaultTeams.length]});
  }
  renderTeamEditor();
}

function renderTeamEditor() {
  const list = document.getElementById('team-editor-list');
  list.innerHTML = '';

  for (let i = 0; i < activeCount; i++) {
    const t = teams[i] || {...defaultTeams[i % defaultTeams.length]};
    teams[i] = t;

    const item = document.createElement('div');
    item.className = 'team-editor-item';
    item.innerHTML = `
      <div class="team-color-preview" style="background:${t.color}" id="color-preview-${i}">
        <input type="color" value="${t.color}" data-idx="${i}" onchange="updateColor(${i}, this.value)">
      </div>
      <input class="team-editor-input" type="text" value="${t.name}" placeholder="Lagnamn"
             data-idx="${i}" oninput="updateName(${i}, this.value)">
      <select class="sound-select" data-idx="${i}" onchange="updateSound(${i}, this.value)">
        ${Object.entries(soundDefs).map(([k,v]) =>
          `<option value="${k}" ${t.sound===k?'selected':''}>${v.label}</option>`
        ).join('')}
      </select>
      <button class="emoji-btn" data-idx="${i}" onclick="toggleEmojiPicker(event, ${i})">${t.emoji}</button>
    `;
    list.appendChild(item);
  }
}

function updateColor(idx, val) {
  teams[idx].color = val;
  document.getElementById(`color-preview-${idx}`).style.background = val;
}
function updateName(idx, val) { teams[idx].name = val; }
function updateSound(idx, val) { teams[idx].sound = val; }

function toggleEmojiPicker(e, idx) {
  e.stopPropagation();
  const picker = document.getElementById('emoji-picker');
  if (openEmojiTarget === idx && picker.classList.contains('open')) {
    closeEmojiPicker(); return;
  }
  openEmojiTarget = idx;
  picker.innerHTML = EMOJIS.map(em =>
    `<div class="emoji-option" onclick="pickEmoji(${idx}, '${em}')">${em}</div>`
  ).join('');

  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  picker.style.display = 'grid';
  picker.classList.add('open');

  // position above or below
  const pickerH = 160;
  const top = rect.bottom + 6 + pickerH > window.innerHeight
    ? rect.top - pickerH - 6
    : rect.bottom + 6;
  picker.style.top = top + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 240) + 'px';
}

function pickEmoji(idx, em) {
  teams[idx].emoji = em;
  // update button
  const btns = document.querySelectorAll(`[data-idx="${idx}"].emoji-btn`);
  btns.forEach(b => b.textContent = em);
  closeEmojiPicker();
}

function closeEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.classList.remove('open');
  picker.style.display = 'none';
  openEmojiTarget = null;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#emoji-picker') && !e.target.closest('.emoji-btn')) {
    closeEmojiPicker();
  }
});

function applySettings() {
  localStorage.setItem('buzzer_teams', JSON.stringify(teams));
  closeTeacherModal();
  renderChooseScreen();
}

// ===== INIT =====
renderChooseScreen();
</script>
