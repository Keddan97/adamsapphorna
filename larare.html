<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizr – Lärarvy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:       #568E14;
    --green-dark:  #3A6409;
    --green-mid:   #7CB52A;
    --green-light: #D4EDAA;
    --green-pale:  #EFF7E0;
    --orange:      #DD5900;
    --orange-pale: #FDEEE5;
    --n1:          #cc3947;
    --n2:          #65337c;
    --n3:          #2c9aa6;
    --bg:          #F8FCF2;
    --card:        #FFFFFF;
    --ink:         #1A2410;
    --ink2:        #556040;
    --border:      #C6DCA0;
    --radius:      14px;
    --danger:      #c0392b;
    --danger-pale: #fdecea;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Source Sans 3',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; }

  /* HEADER */
  header { background:var(--green); padding:0 24px; display:flex; align-items:center; gap:14px; height:64px; flex-shrink:0; }
  .header-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:#fff; letter-spacing:2px; line-height:1; margin-top:2px; }
  .header-divider { width:1px; height:32px; background:rgba(255,255,255,0.3); }
  .header-sub { color:rgba(255,255,255,0.85); font-size:0.88rem; font-weight:500; }
  .header-spacer { flex:1; }
  .logout-btn { border:1.5px solid rgba(255,255,255,0.4); background:none; color:#fff; padding:6px 16px; border-radius:50px; font-family:'Source Sans 3',sans-serif; font-size:0.82rem; cursor:pointer; transition:background 0.15s; }
  .logout-btn:hover { background:rgba(255,255,255,0.15); }

  main { flex:1; display:flex; flex-direction:column; align-items:center; padding:32px 16px 64px; }

  /* LOGIN */
  .login-card { width:100%; max-width:400px; background:var(--card); border:1.5px solid var(--border); border-top:4px solid var(--green); border-radius:var(--radius); padding:40px 36px; text-align:center; margin-top:48px; }
  .login-card h2 { font-size:1.3rem; font-weight:600; margin-bottom:8px; }
  .login-card p { font-size:0.88rem; color:var(--ink2); margin-bottom:28px; }
  .login-input { width:100%; border:1.5px solid var(--border); background:var(--bg); padding:11px 14px; border-radius:10px; font-family:'Source Sans 3',sans-serif; font-size:0.95rem; color:var(--ink); margin-bottom:12px; outline:none; transition:border-color 0.15s; }
  .login-input:focus { border-color:var(--green); }
  .login-btn { width:100%; border:none; background:var(--green); color:#fff; padding:13px; border-radius:50px; font-family:'Source Sans 3',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
  .login-btn:hover { opacity:0.87; }
  .login-error { color:var(--danger); font-size:0.85rem; margin-bottom:10px; display:none; }

  /* TABS */
  .tabs { display:flex; gap:6px; margin-bottom:28px; background:var(--card); border:1.5px solid var(--border); border-radius:50px; padding:4px; width:100%; max-width:720px; }
  .tab-btn { flex:1; border:none; background:none; padding:9px 16px; border-radius:50px; font-family:'Source Sans 3',sans-serif; font-size:0.92rem; font-weight:500; cursor:pointer; color:var(--ink2); transition:all 0.2s; }
  .tab-btn.active { background:var(--green); color:#fff; }

  /* SECTION */
  .section { width:100%; max-width:720px; display:none; }
  .section.active { display:block; }

  /* LEVEL SELECTOR */
  .level-selector { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .level-btn { border:2px solid var(--border); background:var(--card); padding:8px 20px; border-radius:50px; font-family:'Source Sans 3',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; color:var(--ink2); transition:all 0.18s; }
  .level-btn.active { color:#fff; border-color:transparent; }
  .level-btn[data-niva="Nivå 1"].active { background:var(--n1); }
  .level-btn[data-niva="Nivå 2"].active { background:var(--n2); }
  .level-btn[data-niva="Nivå 3"].active { background:var(--n3); }

  /* CARD */
  .card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:24px 28px; margin-bottom:20px; }
  .card h3 { font-size:1rem; font-weight:600; margin-bottom:16px; color:var(--ink); }

  /* FORM */
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .form-row.single { grid-template-columns:1fr; }
  label { font-size:0.8rem; font-weight:600; color:var(--ink2); letter-spacing:0.5px; text-transform:uppercase; display:block; margin-bottom:4px; }
  input[type=text], textarea, select {
    width:100%; border:1.5px solid var(--border); background:var(--bg);
    padding:10px 12px; border-radius:10px; font-family:'Source Sans 3',sans-serif;
    font-size:0.93rem; color:var(--ink); outline:none; transition:border-color 0.15s;
  }
  input[type=text]:focus, textarea:focus, select:focus { border-color:var(--green); }
  textarea { resize:vertical; min-height:80px; }
  .btn-primary { border:none; background:var(--green); color:#fff; padding:11px 28px; border-radius:50px; font-family:'Source Sans 3',sans-serif; font-size:0.92rem; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
  .btn-primary:hover { opacity:0.87; }
  .btn-primary:disabled { opacity:0.4; cursor:default; }
  .btn-danger { border:1.5px solid var(--danger); background:none; color:var(--danger); padding:6px 14px; border-radius:50px; font-family:'Source Sans 3',sans-serif; font-size:0.82rem; font-weight:500; cursor:pointer; transition:background 0.15s, color 0.15s; }
  .btn-danger:hover { background:var(--danger); color:#fff; }
  .save-msg { font-size:0.85rem; color:var(--green); margin-left:12px; opacity:0; transition:opacity 0.3s; }
  .save-msg.show { opacity:1; }

  /* BEGREPP LIST */
  .begrepp-list { margin-top:20px; }
  .begrepp-item { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .begrepp-item:last-child { border-bottom:none; }
  .begrepp-text { flex:1; }
  .begrepp-name { font-weight:600; font-size:0.95rem; color:var(--ink); }
  .begrepp-forklaring { font-size:0.85rem; color:var(--ink2); margin-top:2px; line-height:1.4; }
  .begrepp-kat { font-size:0.72rem; color:var(--orange); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; }
  .empty-msg { color:var(--ink2); font-size:0.9rem; text-align:center; padding:32px 0; }

  /* STATISTIK */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--green-pale); border:1px solid var(--green-light); border-radius:var(--radius); padding:16px 20px; text-align:center; }
  .stat-number { font-size:2rem; font-weight:600; color:var(--green); line-height:1; margin-bottom:4px; }
  .stat-label { font-size:0.78rem; color:var(--ink2); font-weight:500; }

  /* STATISTIK TABELL */
  .stat-table { width:100%; border-collapse:collapse; font-size:0.88rem; }
  .stat-table th { background:var(--green); color:#fff; padding:10px 14px; text-align:left; font-weight:600; font-size:0.8rem; letter-spacing:0.5px; }
  .stat-table th:last-child { text-align:center; }
  .stat-table td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .stat-table tr:last-child td { border-bottom:none; }
  .stat-table tr:nth-child(even) { background:var(--green-pale); }
  .pct-bar-wrap { display:flex; align-items:center; gap:8px; }
  .pct-bar { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .pct-fill { height:100%; border-radius:3px; transition:width 0.4s; }
  .pct-text { font-size:0.82rem; font-weight:600; min-width:36px; text-align:right; }
  .badge-kat { font-size:0.72rem; color:var(--orange); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

  /* SPINNER */
  .spinner-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:40px 0; }
  .spinner { width:32px; height:32px; border-radius:50%; border:3px solid var(--green-light); border-top-color:var(--green); animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* STATUS */
  .status-msg { color:var(--ink2); font-size:0.9rem; text-align:center; padding:32px 0; }

  footer { background:var(--green-dark); text-align:center; padding:12px; font-size:0.72rem; color:rgba(255,255,255,0.45); }
</style>
</head>
<body>

<header>
  <span class="header-title" onclick="location.href='index.html'" style="cursor:pointer">Quizr</span>
  <div class="header-divider"></div>
  <span class="header-sub">Lärarvy</span>
  <div class="header-spacer"></div>
  <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">Logga ut</button>
</header>

<main id="mainArea">
  <!-- LOGIN -->
  <div class="login-card" id="loginView">
    <h2>Lärarinloggning</h2>
    <p>Ange lösenordet för att komma åt lärarvyn.</p>
    <div class="login-error" id="loginError">Fel lösenord. Försök igen.</div>
    <input type="password" class="login-input" id="pwInput" placeholder="Lösenord" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Logga in</button>
  </div>

  <!-- APP (dolt tills inloggad) -->
  <div id="appView" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">

    <div class="tabs" id="tabBar">
      <button class="tab-btn active" onclick="showTab('begrepp')">Begrepp</button>
      <button class="tab-btn" onclick="showTab('statistik')">Statistik</button>
    </div>

    <!-- BEGREPP-SEKTION -->
    <div class="section active" id="tab-begrepp">

      <div class="level-selector" id="begreppLevelSelector"></div>

      <!-- Lägg till begrepp -->
      <div class="card">
        <h3>Lägg till begrepp</h3>
        <div class="form-row">
          <div>
            <label>Begrepp</label>
            <input type="text" id="newBegrepp" placeholder="T.ex. Epik">
          </div>
          <div>
            <label>Kategori</label>
            <input type="text" id="newKategori" placeholder="T.ex. Litteratur" list="kategoriList">
            <datalist id="kategoriList"></datalist>
          </div>
        </div>
        <div class="form-row single">
          <div>
            <label>Förklaring</label>
            <textarea id="newForklaring" placeholder="Skriv förklaringen här…"></textarea>
          </div>
        </div>
        <div style="display:flex;align-items:center;margin-top:4px;">
          <button class="btn-primary" onclick="laggTillBegrepp()" id="addBtn">Spara begrepp</button>
          <span class="save-msg" id="saveMsg">✓ Sparat!</span>
        </div>
      </div>

      <!-- Befintliga begrepp -->
      <div class="card">
        <h3>Befintliga begrepp <span id="begreppCount" style="font-weight:400;color:var(--ink2);font-size:0.88rem;"></span></h3>
        <div id="begreppList"><div class="spinner-wrap"><div class="spinner"></div></div></div>
      </div>

    </div>

    <!-- STATISTIK-SEKTION -->
    <div class="section" id="tab-statistik">

      <div class="level-selector" id="statLevelSelector"></div>

      <div id="statContent"><div class="spinner-wrap"><div class="spinner"></div></div></div>

    </div>

  </div>
</main>

<footer>Quizr &nbsp;·&nbsp; Göinge utbildningscenter &nbsp;·&nbsp; Skapad av Adam Kedert &nbsp;·&nbsp; Vibekodad med Claude (Anthropic)</footer>

<script>
const API = "https://script.google.com/macros/s/AKfycbxTUaieharqemg1X9-5XKTQ0_47UD_u43B6U4gWDnHS4TVjYxbONWXscvwXygMG9Hv4Ng/exec";
const PASSWORD = "vänligkvartersspindel";

let isLoggedIn = false;
let allFragor = [];
let allStats = {};
let selectedBegreppNiva = null;
let selectedStatNiva = null;

// ---- LOGIN ----
function doLogin() {
  const val = document.getElementById("pwInput").value;
  if (val === PASSWORD) {
    isLoggedIn = true;
    document.getElementById("loginView").style.display = "none";
    document.getElementById("appView").style.display = "flex";
    document.getElementById("logoutBtn").style.display = "block";
    loadAll();
  } else {
    document.getElementById("loginError").style.display = "block";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwInput").focus();
  }
}

function logout() {
  isLoggedIn = false;
  document.getElementById("appView").style.display = "none";
  document.getElementById("loginView").style.display = "block";
  document.getElementById("logoutBtn").style.display = "none";
  document.getElementById("pwInput").value = "";
}

// ---- LOAD ----
async function loadAll() {
  try {
    const [fRes, sRes] = await Promise.all([
      fetch(API + "?action=getFragor"),
      fetch(API + "?action=getStatistik")
    ]);
    const fData = await fRes.json();
    const sData = await sRes.json();
    allFragor = fData.fragor || [];
    allStats  = sData.statistik || {};

    const nivaer = [...new Set(allFragor.map(f => f.niva).filter(Boolean))].sort();
    buildLevelSelectors(nivaer);
    if (nivaer.length > 0) {
      selectBegreppNiva(nivaer[0]);
      selectStatNiva(nivaer[0]);
    }
  } catch(e) {
    document.getElementById("begreppList").innerHTML = '<div class="status-msg">Kunde inte hämta data. Kontrollera anslutningen.</div>';
  }
}

function buildLevelSelectors(nivaer) {
  ["begreppLevelSelector","statLevelSelector"].forEach(id => {
    document.getElementById(id).innerHTML = nivaer.map(n =>
      `<button class="level-btn" data-niva="${n}" onclick="${id==='begreppLevelSelector'?'selectBegreppNiva':'selectStatNiva'}('${n}')">${n}</button>`
    ).join("");
  });
}

// ---- TABS ----
function showTab(tab) {
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", (i===0&&tab==="begrepp")||(i===1&&tab==="statistik")));
  document.getElementById("tab-begrepp").classList.toggle("active", tab==="begrepp");
  document.getElementById("tab-statistik").classList.toggle("active", tab==="statistik");
}

// ---- BEGREPP ----
function selectBegreppNiva(niva) {
  selectedBegreppNiva = niva;
  document.querySelectorAll("#begreppLevelSelector .level-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.niva === niva));
  renderBegreppList();
  updateKategoriList();
}

function renderBegreppList() {
  const fragor = allFragor.filter(f => f.niva === selectedBegreppNiva);
  document.getElementById("begreppCount").textContent = `(${fragor.length} begrepp)`;
  if (fragor.length === 0) {
    document.getElementById("begreppList").innerHTML = '<div class="empty-msg">Inga begrepp ännu på den här nivån.</div>';
    return;
  }
  const sorted = [...fragor].sort((a,b) => a.begrepp.localeCompare(b.begrepp, "sv"));
  document.getElementById("begreppList").innerHTML = `
    <div class="begrepp-list">
      ${sorted.map((f,i) => `
        <div class="begrepp-item" id="bi-${i}">
          <div class="begrepp-text">
            <div class="begrepp-name">${f.begrepp}</div>
            <div class="begrepp-forklaring">${f.forklaring}</div>
            ${f.kategori ? `<div class="begrepp-kat">${f.kategori}</div>` : ""}
          </div>
          <button class="btn-danger" onclick="taBortBegrepp('${f.begrepp.replace(/'/g,"\\'")}')">Ta bort</button>
        </div>
      `).join("")}
    </div>`;
}

function updateKategoriList() {
  const kats = [...new Set(allFragor.filter(f=>f.niva===selectedBegreppNiva).map(f=>f.kategori).filter(Boolean))];
  document.getElementById("kategoriList").innerHTML = kats.map(k=>`<option value="${k}">`).join("");
}

async function laggTillBegrepp() {
  const begrepp   = document.getElementById("newBegrepp").value.trim();
  const forklaring= document.getElementById("newForklaring").value.trim();
  const kategori  = document.getElementById("newKategori").value.trim();
  if (!begrepp || !forklaring) { alert("Fyll i begrepp och förklaring."); return; }
  if (!selectedBegreppNiva) { alert("Välj en nivå."); return; }

  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "addBegrepp", begrepp, forklaring, kategori, niva: selectedBegreppNiva }),
      headers: { "Content-Type": "text/plain" }
    });
    const data = await res.json();
    if (data.ok) {
      allFragor.push({ begrepp, forklaring, kategori, niva: selectedBegreppNiva });
      document.getElementById("newBegrepp").value = "";
      document.getElementById("newForklaring").value = "";
      document.getElementById("newKategori").value = "";
      renderBegreppList();
      updateKategoriList();
      const msg = document.getElementById("saveMsg");
      msg.classList.add("show");
      setTimeout(()=>msg.classList.remove("show"), 2500);
    }
  } catch(e) { alert("Något gick fel. Försök igen."); }
  btn.disabled = false;
}

async function taBortBegrepp(begrepp) {
  if (!confirm(`Ta bort "${begrepp}" från ${selectedBegreppNiva}?`)) return;
  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "deleteBegrepp", begrepp, niva: selectedBegreppNiva }),
      headers: { "Content-Type": "text/plain" }
    });
    const data = await res.json();
    if (data.ok) {
      allFragor = allFragor.filter(f => !(f.begrepp===begrepp && f.niva===selectedBegreppNiva));
      renderBegreppList();
    }
  } catch(e) { alert("Kunde inte ta bort. Försök igen."); }
}

// ---- STATISTIK ----
function selectStatNiva(niva) {
  selectedStatNiva = niva;
  document.querySelectorAll("#statLevelSelector .level-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.niva === niva));
  renderStatistik();
}

function renderStatistik() {
  const stats = allStats[selectedStatNiva] || [];
  const container = document.getElementById("statContent");
  if (stats.length === 0) {
    container.innerHTML = '<div class="status-msg">Ingen statistik ännu för den här nivån.</div>';
    return;
  }

  const totaltSvar   = stats.reduce((s,r) => s + (r.totalt||0), 0);
  const snittPct     = stats.filter(r=>r.pctRatt!==null).length > 0
    ? Math.round(stats.filter(r=>r.pctRatt!==null).reduce((s,r)=>s+(r.pctRatt||0),0) / stats.filter(r=>r.pctRatt!==null).length)
    : 0;
  const svara        = stats.filter(r=>r.pctRatt!==null&&r.pctRatt<60&&r.totalt>=5).length;
  const tranade      = stats.filter(r=>r.totalt>0).length;

  const sorted = [...stats].sort((a,b) => (a.pctRatt??100)-(b.pctRatt??100));

  container.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-number">${totaltSvar}</div>
        <div class="stat-label">Totalt antal svar</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${snittPct}%</div>
        <div class="stat-label">Snitt % rätt</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${tranade}</div>
        <div class="stat-label">Tränade begrepp</div>
      </div>
      <div class="stat-card" style="border-color:#f5c0b0; background:var(--orange-pale);">
        <div class="stat-number" style="color:var(--orange);">${svara}</div>
        <div class="stat-label">Svåra begrepp (&lt;60%)</div>
      </div>
    </div>

    <div class="card" style="overflow-x:auto;">
      <h3>Alla begrepp — sorterat efter svårighet</h3>
      <table class="stat-table" style="margin-top:16px;">
        <thead>
          <tr>
            <th>Begrepp</th>
            <th>Kategori</th>
            <th style="text-align:center">Svar</th>
            <th>% Rätt</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(r => {
            const pct = r.pctRatt ?? 0;
            const color = pct >= 75 ? "#568E14" : pct >= 50 ? "#f5a623" : "#DD5900";
            return `<tr>
              <td style="font-weight:600">${r.begrepp}</td>
              <td><span class="badge-kat">${r.kategori||"–"}</span></td>
              <td style="text-align:center;color:var(--ink2)">${r.totalt}</td>
              <td>
                <div class="pct-bar-wrap">
                  <div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${color}"></div></div>
                  <span class="pct-text" style="color:${color}">${r.pctRatt!==null?pct+"%":"–"}</span>
                </div>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
